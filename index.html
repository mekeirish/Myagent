<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🧠 MyAgent — DeepSeek Modif Code</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#0d1117] text-gray-200 font-sans antialiased min-h-screen flex items-center justify-center p-4">

    <main class="w-full max-w-3xl bg-[#161b22] border border-[#30363d] rounded-2xl shadow-2xl p-6 md:p-8 space-y-6">

        <!-- En-tête -->
        <header class="flex items-center justify-between border-b border-[#30363d] pb-4">
            <div class="flex items-center gap-3">
                <span class="text-3xl">🧠</span>
                <h1 class="text-2xl font-bold text-[#58a6ff] tracking-tight">MyAgent</h1>
                <span class="text-xs bg-[#21262d] text-gray-400 px-2 py-0.5 rounded-full border border-[#30363d]">v2</span>
            </div>
            <div class="text-xs text-gray-500">🔒 localStorage</div>
        </header>

        <!-- Zone Clé API + Solde + Compteur -->
        <section class="bg-[#0d1117] border border-[#30363d] rounded-xl p-4 space-y-3">
            <div class="flex flex-col sm:flex-row gap-3">
                <!-- Clé API -->
                <div class="flex-1">
                    <label for="apiKeyInput" class="flex items-center gap-2 text-sm font-medium text-gray-300">
                        <span>🔑</span> Clé API DeepSeek
                    </label>
                    <div class="flex flex-col sm:flex-row gap-2 mt-1">
                        <input type="password" id="apiKeyInput" placeholder="sk-… colle ta clé ici"
                        class="flex-1 bg-[#0d1117] border border-[#30363d] rounded-lg px-4 py-2.5 text-sm text-gray-200 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-[#f0883e] focus:border-transparent transition" />
                        <button id="saveKeyBtn"
                        class="bg-[#1f6feb] hover:bg-[#388bfd] text-white font-medium px-5 py-2.5 rounded-lg text-sm transition flex items-center justify-center gap-1">
                        💾 Sauvegarder
                    </button>
                </div>
                <div id="keyStatus" class="text-xs text-gray-400 flex items-center gap-1">
                    ⚪ Aucune clé sauvegardée
                </div>
                <div id="keyValidation" class="text-xs hidden"></div>
            </div>

            <!-- Solde -->
            <div class="sm:w-48 flex-shrink-0 border-t sm:border-t-0 sm:border-l border-[#30363d] pt-3 sm:pt-0 sm:pl-3 mt-3 sm:mt-0">
                <div class="flex items-center justify-between">
                    <span class="text-sm font-medium text-gray-300">💰 Solde</span>
                    <button id="refreshBalanceBtn"
                    class="text-xs text-[#58a6ff] hover:text-[#79c0ff] transition disabled:opacity-50 disabled:cursor-not-allowed">
                    ↻ Rafraîchir
                </button>
            </div>
            <div id="balanceDisplay" class="text-sm font-mono text-gray-400 mt-1">
                ⏳ Chargement…
            </div>
            <div id="balanceDetails" class="text-[10px] text-gray-600 space-y-0.5 mt-1 hidden">
                <div>💳 Recharge : <span id="toppedUpBalance">—</span></div>
                <div>🎁 Gratuit : <span id="grantedBalance">—</span></div>
            </div>
        </div>
    </div>

    <!-- Compteur de tokens -->
    <div class="flex items-center justify-between border-t border-[#30363d] pt-2 mt-2">
        <span class="text-xs text-gray-500">📊 Tokens : <span id="totalTokens">0</span></span>
        <span class="text-xs text-gray-500">💰 Coût : <span id="totalCost">0.0000</span> €</span>
        <button id="resetStatsBtn" class="text-xs text-red-400 hover:text-red-300 transition">
            ↺ Reset
        </button>
    </div>
</section>

<!-- Zone Code + Instructions -->
<section class="space-y-4">
    <div>
        <label for="codeInput" class="flex items-center gap-2 text-sm font-medium text-gray-300">
            <span>📄</span> Code à modifier
        </label>
        <textarea id="codeInput" rows="6" placeholder="Colle ton code React / HTML ici…"
        class="w-full bg-[#0d1117] border border-[#30363d] rounded-lg px-4 py-3 text-sm text-gray-200 placeholder-gray-500 font-mono focus:outline-none focus:ring-2 focus:ring-[#58a6ff] focus:border-transparent transition resize-y"></textarea>
    </div>

    <div>
        <label for="instructionsInput" class="flex items-center gap-2 text-sm font-medium text-gray-300">
            <span>📝</span> Instructions
        </label>
        <input type="text" id="instructionsInput" placeholder="Ex: Ajoute un bouton de suppression, corrige le bug, rends responsive…"
        class="w-full bg-[#0d1117] border border-[#30363d] rounded-lg px-4 py-2.5 text-sm text-gray-200 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-[#58a6ff] focus:border-transparent transition" />
    </div>

    <button id="sendBtn"
    class="w-full bg-[#238636] hover:bg-[#2ea043] text-white font-semibold py-3 rounded-lg text-sm transition flex items-center justify-center gap-2 disabled:opacity-60 disabled:cursor-not-allowed">
    🚀 Modifier le code
</button>
</section>

<!-- Résultat avec bouton de copie -->
<section class="border-t border-[#30363d] pt-4">
    <div class="flex items-center justify-between mb-2">
        <span class="text-sm font-medium text-gray-300">📬 Réponse</span>
        <div class="flex items-center gap-2">
            <span class="text-xs text-gray-500" id="timestamp"></span>
            <button id="copyBtn"
            class="text-xs bg-[#1f6feb] hover:bg-[#388bfd] text-white px-3 py-1 rounded-lg transition disabled:opacity-50 disabled:cursor-not-allowed">
            📋 Copier
        </button>
    </div>
</div>
<!-- Zone de résultat (code uniquement) -->
<div id="result"
class="bg-[#0d1117] border border-[#30363d] rounded-xl p-4 min-h-[120px] text-sm text-gray-300 whitespace-pre-wrap font-mono overflow-auto">
⏳ En attente de ta première requête…
</div>

<!-- Zone des stats (séparée) -->
<div id="statsBlock" class="mt-2 text-xs text-gray-500 bg-[#0d1117] border border-[#30363d] rounded-xl p-3 hidden">
    <span id="statsContent"></span>
</div>
</section>

<!-- Footer -->
<footer class="text-xs text-gray-600 border-t border-[#30363d] pt-4 flex justify-between">
    <span>🧠 MyAgent · propulsé par DeepSeek API</span>
    <span>⚡ cache automatique</span>
</footer>
</main>

<!-- ======================== JAVASCRIPT ======================== -->
<script>
    (function() {
        // === Éléments DOM ===
        const apiKeyInput = document.getElementById('apiKeyInput');
        const saveKeyBtn = document.getElementById('saveKeyBtn');
        const keyStatus = document.getElementById('keyStatus');
        const keyValidation = document.getElementById('keyValidation');
        const codeInput = document.getElementById('codeInput');
        const instructionsInput = document.getElementById('instructionsInput');
        const sendBtn = document.getElementById('sendBtn');
        const resultDiv = document.getElementById('result');
        const timestamp = document.getElementById('timestamp');
        const totalTokensSpan = document.getElementById('totalTokens');
        const totalCostSpan = document.getElementById('totalCost');
        const resetStatsBtn = document.getElementById('resetStatsBtn');
        const copyBtn = document.getElementById('copyBtn');
        const statsBlock = document.getElementById('statsBlock');
        const statsContent = document.getElementById('statsContent');

        // Éléments pour le solde
        const balanceDisplay = document.getElementById('balanceDisplay');
        const balanceDetails = document.getElementById('balanceDetails');
        const toppedUpBalance = document.getElementById('toppedUpBalance');
        const grantedBalance = document.getElementById('grantedBalance');
        const refreshBalanceBtn = document.getElementById('refreshBalanceBtn');

        // === Nettoyer les backticks ===
        function cleanCodeResponse(text) {
            // Supprime les ```html, ```jsx, ```javascript, ``` en début et fin
            let cleaned = text.replace(/^```(?:html|jsx|javascript)?\s*/i, '');
            cleaned = cleaned.replace(/\s*```$/, '');
            return cleaned.trim();
        }

        // === Chargement des stats depuis localStorage ===
        function loadStats() {
            const tokens = parseInt(localStorage.getItem('myagent_total_tokens')) || 0;
            const cost = parseFloat(localStorage.getItem('myagent_total_cost')) || 0;
            totalTokensSpan.textContent = tokens;
            totalCostSpan.textContent = cost.toFixed(6);
        }

        // === Sauvegarde des stats ===
        function saveStats(tokens, cost) {
            const currentTokens = parseInt(localStorage.getItem('myagent_total_tokens')) || 0;
            const currentCost = parseFloat(localStorage.getItem('myagent_total_cost')) || 0;
            localStorage.setItem('myagent_total_tokens', currentTokens + tokens);
            localStorage.setItem('myagent_total_cost', (currentCost + cost).toFixed(6));
            loadStats();
        }

        // === Réinitialiser les stats ===
        function resetStats() {
            if (confirm('🔄 Réinitialiser le compteur de tokens et le coût ?')) {
                localStorage.removeItem('myagent_total_tokens');
                localStorage.removeItem('myagent_total_cost');
                loadStats();
            }
        }

        // === Récupérer le solde ===
        async function fetchBalance(apiKey, silent = false) {
            if (!apiKey) {
                apiKey = localStorage.getItem('myagent_api_key');
                if (!apiKey) {
                    if (!silent) {
                        balanceDisplay.textContent = '🔑 Aucune clé';
                        balanceDisplay.className = 'text-sm font-mono text-gray-500 mt-1';
                        balanceDetails.classList.add('hidden');
                    }
                    return;
                }
            }

            if (!silent) {
                refreshBalanceBtn.disabled = true;
                balanceDisplay.textContent = '⏳ Chargement…';
                balanceDisplay.className = 'text-sm font-mono text-gray-400 mt-1';
                balanceDetails.classList.add('hidden');
            }

            try {
                const response = await fetch('https://api.deepseek.com/user/balance', {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Accept': 'application/json'
                    }
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`HTTP ${response.status}: ${errorText}`);
                }

                const data = await response.json();
                console.log('Réponse brute du solde :', data);

                if (data && data.is_available && data.balance_infos && data.balance_infos.length > 0) {
                    const info = data.balance_infos[0];
                    const total = parseFloat(info.total_balance || 0);
                    const topped = parseFloat(info.topped_up_balance || 0);
                    const granted = parseFloat(info.granted_balance || 0);
                    const currency = info.currency || 'CNY';

                    balanceDisplay.textContent = `${total.toFixed(2)} ${currency}`;
                    balanceDisplay.className = 'text-sm font-mono font-semibold text-green-400 mt-1';

                    toppedUpBalance.textContent = topped.toFixed(2);
                    grantedBalance.textContent = granted.toFixed(2);
                    balanceDetails.classList.remove('hidden');

                    if (!silent) {
                        keyValidation.textContent = '✅ Clé valide';
                        keyValidation.className = 'text-xs text-green-400 mt-1';
                        keyValidation.classList.remove('hidden');
                    }
                } else {
                    balanceDisplay.textContent = '⚠️ Format inattendu';
                    balanceDisplay.className = 'text-sm font-mono text-yellow-400 mt-1';
                    if (!silent) {
                        keyValidation.textContent = '⚠️ Clé invalide ou compte sans solde';
                        keyValidation.className = 'text-xs text-yellow-400 mt-1';
                        keyValidation.classList.remove('hidden');
                    }
                }
            } catch (err) {
                console.error('Erreur solde:', err);
                balanceDisplay.textContent = `❌ ${err.message}`;
                balanceDisplay.className = 'text-sm font-mono text-red-400 mt-1';
                balanceDetails.classList.add('hidden');
                if (!silent) {
                    keyValidation.textContent = '❌ Clé invalide';
                    keyValidation.className = 'text-xs text-red-400 mt-1';
                    keyValidation.classList.remove('hidden');
                }
            } finally {
                if (!silent) {
                    refreshBalanceBtn.disabled = false;
                }
            }
        }

        // === Charger la clé ===
        function loadKey() {
            const saved = localStorage.getItem('myagent_api_key');
            if (saved) {
                apiKeyInput.value = saved;
                keyStatus.innerHTML = '✅ Clé chargée depuis localStorage';
                keyStatus.className = 'text-xs text-green-400 flex items-center gap-1';
                fetchBalance(saved, true);
            } else {
                keyStatus.innerHTML = '⚪ Aucune clé sauvegardée (entre ta clé et clique sur Sauvegarder)';
                keyStatus.className = 'text-xs text-gray-400 flex items-center gap-1';
                balanceDisplay.textContent = '🔑 Aucune clé';
                balanceDisplay.className = 'text-sm font-mono text-gray-500 mt-1';
                balanceDetails.classList.add('hidden');
                keyValidation.classList.add('hidden');
            }
        }

        // === Sauvegarder la clé ===
        function saveKey() {
            const key = apiKeyInput.value.trim();
            if (!key) {
                alert('❌ Merci de coller ta clé API avant de sauvegarder.');
                return;
            }
            localStorage.setItem('myagent_api_key', key);
            keyStatus.innerHTML = '✅ Clé sauvegardée dans localStorage !';
            keyStatus.className = 'text-xs text-green-400 flex items-center gap-1';
            fetchBalance(key, false);
            alert('🔐 Clé sauvegardée avec succès ! Vérification du solde en cours…');
        }

        // === Copier le code ===
        function copyCode() {
            const code = resultDiv.textContent;
            if (!code || code.startsWith('⏳') || code.startsWith('❌')) {
                alert('📄 Rien à copier pour l\'instant.');
                return;
            }
            navigator.clipboard.writeText(code).then(() => {
                const originalText = copyBtn.textContent;
                copyBtn.textContent = '✅ Copié !';
                copyBtn.disabled = true;
                setTimeout(() => {
                    copyBtn.textContent = originalText;
                    copyBtn.disabled = false;
                }, 2000);
            }).catch(err => {
                alert('❌ Erreur lors de la copie : ' + err.message);
            });
        }

        // === Envoyer la requête ===
        async function sendRequest() {
            const apiKey = localStorage.getItem('myagent_api_key');
            if (!apiKey) {
                alert('⚠️ Tu dois d\'abord sauvegarder ta clé API (champ en haut).');
                return;
            }

            const code = codeInput.value.trim();
            const instructions = instructionsInput.value.trim();

            if (!code) { alert('📄 Colle un peu de code à modifier !'); return; }
            if (!instructions) { alert('📝 Donne des instructions sur ce que tu veux modifier.'); return; }

            resultDiv.textContent = '⏳ Envoi en cours… Patientez quelques secondes.';
            statsBlock.classList.add('hidden');
            sendBtn.disabled = true;
            sendBtn.innerHTML = '⏳ En cours…';
            copyBtn.disabled = true;

            try {
                const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: 'deepseek-v4-flash',
                        messages: [
                            { role: 'system', content: 'Tu es un expert en React 19 et HTML5. Tu modifies le code que je te donne en respectant mes instructions. Tu réponds UNIQUEMENT avec le code modifié, sans explications, dans un bloc de code markdown.' },
                            { role: 'user', content: `Code :\n${code}\n\nInstructions : ${instructions}` }
                        ],
                        stream: false
                    })
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`Erreur HTTP ${response.status}: ${errorText}`);
                }

                const data = await response.json();
                let modified = data.choices[0].message.content;

                // Nettoyage des backticks
                modified = cleanCodeResponse(modified);

                // Affichage du code nettoyé
                resultDiv.textContent = modified;
                timestamp.textContent = new Date().toLocaleTimeString();

                // === Calcul du coût et affichage dans le bloc séparé ===
                const usage = data.usage;
                if (usage) {
                    const promptTokens = usage.prompt_tokens || 0;
                    const completionTokens = usage.completion_tokens || 0;
                    const totalTokens = usage.total_tokens || 0;

                    const priceInput = 0.14;
                    const priceOutput = 0.28;

                    const costInput = (promptTokens / 1_000_000) * priceInput;
                    const costOutput = (completionTokens / 1_000_000) * priceOutput;
                    const totalCost = costInput + costOutput;

                    saveStats(totalTokens, totalCost);

                    // Affichage des stats dans le bloc séparé
                    statsContent.textContent =
                        `📊 Tokens : ${totalTokens} (${promptTokens} entrée, ${completionTokens} sortie) | 💰 Coût : ${totalCost.toFixed(6)} €`;
                    statsBlock.classList.remove('hidden');
                }

                localStorage.setItem('myagent_last_code', code);
                localStorage.setItem('myagent_last_instructions', instructions);

                fetchBalance(apiKey, true);

            } catch (err) {
                resultDiv.textContent = `❌ Erreur : ${err.message}`;
                console.error(err);
                statsBlock.classList.add('hidden');
            } finally {
                sendBtn.disabled = false;
                sendBtn.innerHTML = '🚀 Modifier le code';
                copyBtn.disabled = false;
            }
        }

        // === Charger les champs sauvegardés ===
        function loadFields() {
            const savedCode = localStorage.getItem('myagent_last_code');
            const savedInstructions = localStorage.getItem('myagent_last_instructions');
            if (savedCode) codeInput.value = savedCode;
            if (savedInstructions) instructionsInput.value = savedInstructions;
        }

        // === Événements ===
        saveKeyBtn.addEventListener('click', saveKey);
        sendBtn.addEventListener('click', sendRequest);
        resetStatsBtn.addEventListener('click', resetStats);
        copyBtn.addEventListener('click', copyCode);

        refreshBalanceBtn.addEventListener('click', () => {
            const key = localStorage.getItem('myagent_api_key');
            if (key) fetchBalance(key, false);
            else alert('⚠️ Sauvegarde d\'abord ta clé API.');
        });

        codeInput.addEventListener('input', () => {
            localStorage.setItem('myagent_last_code', codeInput.value);
        });
        instructionsInput.addEventListener('input', () => {
            localStorage.setItem('myagent_last_instructions', instructionsInput.value);
        });

        instructionsInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') sendRequest();
        });

        // === Init ===
        loadKey();
        loadStats();
        loadFields();
        timestamp.textContent = '—';
        statsBlock.classList.add('hidden');
    })();
</script>

</body>
</html>

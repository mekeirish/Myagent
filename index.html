<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🧠 MyAgent v5.2 — CSS Protégé</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#0d1117] text-gray-200 font-sans antialiased min-h-screen flex items-center justify-center p-4">

    <main class="w-full max-w-5xl bg-[#161b22] border border-[#30363d] rounded-2xl shadow-2xl p-4 md:p-6 space-y-4">

        <!-- En-tête -->
        <header class="flex items-center justify-between border-b border-[#30363d] pb-3">
            <div class="flex items-center gap-2">
                <span class="text-2xl">🧠</span>
                <h1 class="text-xl font-bold text-[#58a6ff]">MyAgent v5.2</h1>
                <span class="text-xs bg-[#f0883e] text-white px-2 py-0.5 rounded-full">⚡ CSS Protégé</span>
            </div>
            <div class="text-xs text-gray-500">🔒 localStorage</div>
        </header>

        <!-- Clé API + Solde -->
        <section class="bg-[#0d1117] border border-[#30363d] rounded-xl p-3 space-y-2">
            <div class="flex flex-col sm:flex-row gap-2">
                <div class="flex-1 flex flex-col sm:flex-row gap-2">
                    <input type="password" id="apiKeyInput" placeholder="sk-…" class="flex-1 bg-[#0d1117] border border-[#30363d] rounded-lg px-3 py-2 text-sm" />
                    <button id="saveKeyBtn" class="bg-[#1f6feb] hover:bg-[#388bfd] text-white px-4 py-2 rounded-lg text-sm transition">💾 Sauvegarder</button>
                </div>
                <div class="flex items-center gap-3 text-sm">
                    <span class="text-gray-400">💰</span>
                    <span id="balanceDisplay" class="font-mono text-green-400">⏳</span>
                    <button id="refreshBalanceBtn" class="text-xs text-[#58a6ff]">↻</button>
                </div>
            </div>
            <div id="keyStatus" class="text-xs text-gray-400">⚪ Aucune clé</div>
        </section>

        <!-- Code Source -->
        <section class="space-y-1">
            <div class="flex items-center justify-between">
                <label class="text-sm font-medium text-gray-300">📄 Code Source</label>
                <div class="flex gap-2">
                    <button id="autoTagBtn" class="text-xs bg-[#f0883e] hover:bg-[#f0a83e] text-white px-2 py-1 rounded-lg transition">🏷️ Baliser (CSS safe)</button>
                    <button id="fixCssBtn" class="text-xs bg-[#1f6feb] hover:bg-[#388bfd] text-white px-2 py-1 rounded-lg transition">🔧 Réparer CSS</button>
                    <button id="loadExampleBtn" class="text-xs bg-[#1f6feb] hover:bg-[#388bfd] px-2 py-1 rounded-lg">📥 Exemple</button>
                    <button id="resetCodeBtn" class="text-xs bg-red-500/20 hover:bg-red-500/30 text-red-400 px-2 py-1 rounded-lg">🗑️</button>
                </div>
            </div>
            <textarea id="fullCodeInput" rows="6" placeholder="Colle ton code ici..."
            class="w-full bg-[#0d1117] border border-[#30363d] rounded-lg px-3 py-2 text-sm text-gray-200 placeholder-gray-500 font-mono resize-y"></textarea>
            <div class="flex justify-between text-xs text-gray-500">
                <span id="codeStats">📊 0 sections</span>
                <span id="tagStatus">⚪ Non balisé</span>
            </div>
        </section>

        <!-- Instructions + Batch -->
        <section class="space-y-2">
            <div class="flex items-center gap-2">
                <label class="text-sm font-medium text-gray-300">📝 Instructions</label>
                <button id="toggleBatchBtn" class="text-xs bg-[#1f6feb] hover:bg-[#388bfd] text-white px-2 py-0.5 rounded-lg transition">📋 Mode batch</button>
            </div>
            <div class="flex gap-2">
                <input type="text" id="instructionsInput" placeholder="Une instruction simple..."
                class="flex-1 bg-[#0d1117] border border-[#30363d] rounded-lg px-3 py-2 text-sm" />
                <button id="sendBtn" class="bg-[#238636] hover:bg-[#2ea043] text-white px-4 py-2 rounded-lg text-sm transition disabled:opacity-50">🚀 Patcher</button>
            </div>
            <div id="batchContainer" class="hidden">
                <textarea id="batchInput" rows="4" placeholder="Écris une instruction par ligne&#10;Ex:&#10;Change la couleur du canvas en rouge&#10;Ajoute un bouton de zoom&#10;Rends le texte plus gros"
                class="w-full bg-[#0d1117] border border-[#30363d] rounded-lg px-3 py-2 text-sm text-gray-200 placeholder-gray-500 font-mono resize-y"></textarea>
                <button id="batchSendBtn" class="w-full bg-[#1f6feb] hover:bg-[#388bfd] text-white px-4 py-2 rounded-lg text-sm transition mt-1">🚀 Exécuter le batch</button>
            </div>
        </section>

        <!-- Patches détectés -->
        <section class="border-t border-[#30363d] pt-3">
            <div class="flex items-center justify-between mb-1">
                <span class="text-sm font-medium text-gray-300">🧩 Patches</span>
                <span class="text-xs text-gray-500" id="patchTimestamp"></span>
            </div>
            <div id="patchesContainer" class="space-y-1 text-sm">
                <div class="text-gray-500 italic">En attente d'instructions...</div>
            </div>
        </section>

        <!-- Code final + Historique -->
        <section class="border-t border-[#30363d] pt-3">
            <div class="flex items-center justify-between mb-1">
                <span class="text-sm font-medium text-gray-300">📦 Code Final</span>
                <div class="flex gap-2">
                    <button id="copyFinalBtn" class="text-xs bg-[#1f6feb] hover:bg-[#388bfd] text-white px-2 py-1 rounded-lg">📋</button>
                    <button id="exportFinalBtn" class="text-xs bg-[#238636] hover:bg-[#2ea043] text-white px-2 py-1 rounded-lg">⬇️</button>
                    <button id="showHistoryBtn" class="text-xs bg-[#f0883e] hover:bg-[#f0a83e] text-white px-2 py-1 rounded-lg">📜 Historique</button>
                </div>
            </div>
            <div id="finalCodeDisplay"
            class="bg-[#0d1117] border border-[#30363d] rounded-lg p-3 min-h-[80px] text-sm text-gray-300 whitespace-pre-wrap font-mono overflow-auto max-h-48">
            ⏳ Aucun code
        </div>
    </section>

    <!-- Sandbox en temps réel -->
    <section class="border-t border-[#30363d] pt-3">
        <div class="flex items-center justify-between mb-1">
            <span class="text-sm font-medium text-gray-300">🏖️ Aperçu en direct</span>
            <button id="refreshSandboxBtn" class="text-xs bg-[#1f6feb] hover:bg-[#388bfd] text-white px-2 py-1 rounded-lg">↻ Rafraîchir</button>
        </div>
        <iframe id="sandboxIframe" class="w-full bg-white rounded-lg border border-[#30363d]" style="height: 300px; resize: vertical; min-height: 200px;"></iframe>
    </section>

    <!-- Console -->
    <section class="border-t border-[#30363d] pt-3">
        <div class="flex items-center justify-between mb-1">
            <span class="text-sm font-medium text-gray-300">📋 Console</span>
            <div class="flex gap-2">
                <button id="clearConsoleBtn" class="text-xs bg-red-500/20 hover:bg-red-500/30 text-red-400 px-2 py-1 rounded-lg">🗑️ Effacer</button>
                <button id="copyConsoleBtn" class="text-xs bg-[#1f6feb] hover:bg-[#388bfd] text-white px-2 py-1 rounded-lg">📋 Copier</button>
            </div>
        </div>
        <div id="consoleOutput"
        class="bg-[#0a0a0c] border border-[#30363d] rounded-lg p-2 min-h-[80px] max-h-[150px] overflow-auto font-mono text-xs text-gray-400 whitespace-pre-wrap">
        ⏳ Console prête...
    </div>
</section>

<!-- Footer -->
<footer class="text-xs text-gray-600 border-t border-[#30363d] pt-2 flex justify-between">
    <span>🧠 MyAgent v5.2 · CSS Protégé</span>
    <span>⚡ cache automatique</span>
</footer>
</main>

<!-- ======================== JAVASCRIPT ======================== -->
<script>
    (function() {
        // === RÉFÉRENCES DOM ===
        const $ = id => document.getElementById(id);
        const apiKeyInput = $('apiKeyInput');
        const saveKeyBtn = $('saveKeyBtn');
        const keyStatus = $('keyStatus');
        const balanceDisplay = $('balanceDisplay');
        const refreshBalanceBtn = $('refreshBalanceBtn');
        const fullCodeInput = $('fullCodeInput');
        const instructionsInput = $('instructionsInput');
        const sendBtn = $('sendBtn');
        const batchContainer = $('batchContainer');
        const batchInput = $('batchInput');
        const batchSendBtn = $('batchSendBtn');
        const toggleBatchBtn = $('toggleBatchBtn');
        const patchesContainer = $('patchesContainer');
        const patchTimestamp = $('patchTimestamp');
        const finalCodeDisplay = $('finalCodeDisplay');
        const copyFinalBtn = $('copyFinalBtn');
        const exportFinalBtn = $('exportFinalBtn');
        const showHistoryBtn = $('showHistoryBtn');
        const codeStats = $('codeStats');
        const tagStatus = $('tagStatus');
        const loadExampleBtn = $('loadExampleBtn');
        const resetCodeBtn = $('resetCodeBtn');
        const autoTagBtn = $('autoTagBtn');
        const fixCssBtn = $('fixCssBtn');
        const consoleOutput = $('consoleOutput');
        const clearConsoleBtn = $('clearConsoleBtn');
        const copyConsoleBtn = $('copyConsoleBtn');
        const sandboxIframe = $('sandboxIframe');
        const refreshSandboxBtn = $('refreshSandboxBtn');

        // === ÉTAT ===
        let fullCode = localStorage.getItem('myagent_full_code') || '';
        let sectionMapping = JSON.parse(localStorage.getItem('myagent_section_mapping') || '{}');
        let patchHistory = JSON.parse(localStorage.getItem('myagent_patch_history') || '[]');
        let currentPatchesData = null;
        let isBatchMode = false;

        // === CONSOLE ===
        function log(message, type = 'info') {
            const prefix = { info: 'ℹ️', success: '✅', error: '❌', warning: '⚠️', debug: '🔍', tag: '🏷️' };
            const timestamp = new Date().toLocaleTimeString();
            const line = `[${timestamp}] ${prefix[type] || '•'} ${message}`;
            consoleOutput.textContent += (consoleOutput.textContent ? '\n' : '') + line;
            consoleOutput.scrollTop = consoleOutput.scrollHeight;
            console.log(`[MyAgent] ${message}`);
        }

        function clearConsole() { consoleOutput.textContent = '🧹 Console vidée'; }
        function copyConsole() {
            navigator.clipboard.writeText(consoleOutput.textContent).then(() => {
                const orig = copyConsoleBtn.textContent;
                copyConsoleBtn.textContent = '✅';
                setTimeout(() => copyConsoleBtn.textContent = orig, 1500);
            });
        }
        clearConsoleBtn.addEventListener('click', clearConsole);
        copyConsoleBtn.addEventListener('click', copyConsole);

        // === CHARGEMENT ===
        function loadFullCode() {
            const saved = localStorage.getItem('myagent_full_code');
            if (saved) {
                fullCode = saved;
                fullCodeInput.value = saved;
                updateFinalCodeDisplay();
                updateCodeStats();
                log('Code source chargé depuis localStorage', 'success');
                if (hasTags(fullCode)) {
                    tagStatus.textContent = '✅ Balisé';
                    tagStatus.className = 'text-xs text-green-400';
                } else {
                    tagStatus.textContent = '⚪ Non balisé';
                    tagStatus.className = 'text-xs text-gray-400';
                }
                updateSandbox();
            }
        }

        function updateFinalCodeDisplay() {
            finalCodeDisplay.textContent = fullCode || '⏳ Aucun code source.';
            localStorage.setItem('myagent_full_code', fullCode);
            localStorage.setItem('myagent_section_mapping', JSON.stringify(sectionMapping));
            localStorage.setItem('myagent_patch_history', JSON.stringify(patchHistory));
            updateSandbox();
        }

        function updateCodeStats() {
            const sections = extractSections(fullCode);
            codeStats.textContent = `📊 ${sections.length} sections`;
        }

        function hasTags(code) { return /\/\/\s*==SECTION:/.test(code); }

        function extractSections(code) {
            const regex = /\/\/\s*==SECTION:\s*([^\n]+)==\s*([\s\S]*?)\s*\/\/\s*==END==/g;
            const sections = [];
            let match;
            while ((match = regex.exec(code)) !== null) {
                sections.push({ name: match[1].trim(), content: match[2].trim(), fullMatch: match[0] });
            }
            return sections;
        }

        // === SANDBOX ===
        function updateSandbox() {
            try {
                const htmlContent = fullCode || '<html><body><p>⏳ Aucun code à afficher</p></body></html>';
                const blob = new Blob([htmlContent], { type: 'text/html' });
                const url = URL.createObjectURL(blob);
                sandboxIframe.src = url;
                setTimeout(() => URL.revokeObjectURL(url), 1000);
                log('🏖️ Sandbox mis à jour', 'success');
            } catch (e) {
                log(`❌ Erreur sandbox : ${e.message}`, 'error');
            }
        }

        refreshSandboxBtn.addEventListener('click', updateSandbox);

        // === HISTORIQUE ===
        function addToHistory(patch, instruction) {
            const entry = {
                id: Date.now(),
                timestamp: new Date().toISOString(),
                section: patch.section,
                oldContent: patch.oldContent || '',
                newContent: patch.newContent,
                instruction: instruction,
                fullCode: fullCode
            };
            patchHistory.push(entry);
            if (patchHistory.length > 50) patchHistory.shift();
            localStorage.setItem('myagent_patch_history', JSON.stringify(patchHistory));
            log(`💾 Patch sauvegardé dans l'historique (${patchHistory.length})`, 'success');
        }

        function showHistory() {
            if (patchHistory.length === 0) {
                alert('📜 Aucun historique pour le moment.');
                return;
            }
            let msg = '📜 HISTORIQUE DES PATCHS\n' + '═'.repeat(40) + '\n';
            patchHistory.slice().reverse().forEach((entry, i) => {
                const date = new Date(entry.timestamp).toLocaleString();
                msg += `[${i+1}] ${date}\n`;
                msg += `📌 Section: ${entry.section}\n`;
                msg += `📝 Instruction: ${entry.instruction || 'N/A'}\n`;
                msg += `🔄 Contenu: ${(entry.newContent || '').substring(0, 60)}...\n`;
                msg += '─'.repeat(40) + '\n';
            });
            alert(msg);
        }

        showHistoryBtn.addEventListener('click', showHistory);

        // === APPLICATION D'UN PATCH ===
        function applyPatch(patch, instruction = '') {
            const { section, newContent } = patch;
            log(`Application du patch sur "${section}"...`, 'debug');

            let oldContent = '';
            const regex = new RegExp(`(\/\/\\s*==SECTION:\\s*${escapeRegex(section)}==)[\\s\\S]*?(\/\/\\s*==END==)`, 'g');
            const match = regex.exec(fullCode);
            if (match) oldContent = match[0];

            if (newContent === null || newContent === 'null') {
                fullCode = fullCode.replace(regex, '');
                log(`Section "${section}" supprimée`, 'success');
                fullCodeInput.value = fullCode;
                updateFinalCodeDisplay();
                updateCodeStats();
                finalCodeDisplay.textContent = fullCode;
                delete sectionMapping[section];
                localStorage.setItem('myagent_section_mapping', JSON.stringify(sectionMapping));
                addToHistory({ section, newContent: null, oldContent }, instruction);
                return true;
            }

            let cleanContent = newContent;
            cleanContent = cleanContent.replace(/^```(?:jsx|javascript|html)?\s*/i, '');
            cleanContent = cleanContent.replace(/\s*```$/, '');
            cleanContent = cleanContent.trim();

            if (match) {
                const newSection = `// ==SECTION: ${section}==\n${cleanContent}\n// ==END==`;
                fullCode = fullCode.replace(match[0], newSection);
                log(`Section "${section}" mise à jour`, 'success');
            } else {
                const newSection = `\n// ==SECTION: ${section}==\n${cleanContent}\n// ==END==`;
                fullCode += newSection;
                log(`Section "${section}" créée`, 'success');
                sectionMapping[section] = { originalName: section, type: 'patch-created', timestamp: new Date().toISOString() };
                localStorage.setItem('myagent_section_mapping', JSON.stringify(sectionMapping));
            }

            fullCodeInput.value = fullCode;
            updateFinalCodeDisplay();
            updateCodeStats();
            finalCodeDisplay.textContent = fullCode;
            addToHistory({ section, newContent: cleanContent, oldContent }, instruction);
            updateSandbox();
            return true;
        }

        function escapeRegex(string) {
            return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        // === RÉPARER LE CSS (supprime les balises dans les blocs <style>) ===
        function fixCssInCode(code) {
            // Trouver tous les blocs <style>
            const styleRegex = /<style[\s\S]*?<\/style>/g;
            let fixed = code;
            let match;
            while ((match = styleRegex.exec(code)) !== null) {
                const styleBlock = match[0];
                // Nettoyer les balises SECTION/END à l'intérieur du bloc
                const cleanStyle = styleBlock
                    .replace(/\/\/\s*==SECTION:.*==\n?/g, '')
                    .replace(/\/\/\s*==END==\n?/g, '');
                fixed = fixed.replace(styleBlock, cleanStyle);
            }
            // Nettoyer les balises orphelines en dehors des blocs (optionnel)
            // fixed = fixed.replace(/\/\/\s*==SECTION:.*==\n?/g, '');
            // fixed = fixed.replace(/\/\/\s*==END==\n?/g, '');
            return fixed;
        }

        function applyFixCss() {
            const code = fullCodeInput.value.trim();
            if (!code) { alert('📄 Colle du code d\'abord.'); return; }
            const fixed = fixCssInCode(code);
            fullCode = fixed;
            fullCodeInput.value = fixed;
            updateFinalCodeDisplay();
            updateCodeStats();
            log('🔧 CSS réparé (balises supprimées)', 'success');
            patchesContainer.innerHTML = '<div class="text-gray-500 italic">🔧 CSS réparé. Vérifie le rendu dans le sandbox.</div>';
            updateSandbox();
        }

        // === BALISAGE CSS-SAFE ===
        function autoTagCodePropre(code) {
            log('🏷️ Balisage CSS-safe...', 'tag');

            // Étape 1 : Protéger les blocs <style> et <script> avec des placeholders
            const styleRegex = /<style[\s\S]*?<\/style>/g;
            const scriptRegex = /<script(?![^>]*type="text\/babel")[\s\S]*?<\/script>/g;

            const protectedBlocks = [];
            let tempCode = code;

            // Protéger les blocs <style>
            let match;
            while ((match = styleRegex.exec(tempCode)) !== null) {
                const placeholder = `__PROTECTED_STYLE_${protectedBlocks.length}__`;
                protectedBlocks.push({ type: 'style', content: match[0], placeholder });
                tempCode = tempCode.replace(match[0], placeholder);
            }

            // Protéger les blocs <script>
            while ((match = scriptRegex.exec(tempCode)) !== null) {
                const placeholder = `__PROTECTED_SCRIPT_${protectedBlocks.length}__`;
                protectedBlocks.push({ type: 'script', content: match[0], placeholder });
                tempCode = tempCode.replace(match[0], placeholder);
            }

            // Étape 2 : Balisage sur le code restant (sans CSS/script)
            let result = tempCode;
            const components = [];

            // Détection des composants React
            const componentRegex = /const\s+([A-Z][a-zA-Z0-9_]*)\s*=\s*(?:\(\)\s*=>\s*{([\s\S]*?)}|\([^)]*\)\s*=>\s*{([\s\S]*?)})/g;
            while ((match = componentRegex.exec(tempCode)) !== null) {
                const name = match[1];
                const fullBlock = extractFullBlock(tempCode, match.index);
                if (fullBlock && !components.some(c => c.name === name)) {
                    components.push({ name, fullBlock });
                }
            }

            // Détection des fonctions nommées
            const functionRegex = /function\s+([a-zA-Z_][a-zA-Z0-9_]*)\s*\(/g;
            while ((match = functionRegex.exec(tempCode)) !== null) {
                const name = match[1];
                const fullBlock = extractFullBlock(tempCode, match.index);
                if (fullBlock && !components.some(c => c.name === name)) {
                    components.push({ name, fullBlock });
                }
            }

            // Détection des hooks
            const hookRegex = /const\s+([a-zA-Z_][a-zA-Z0-9_]*)\s*=\s*(useCallback|useMemo|useEffect)\(/g;
            while ((match = hookRegex.exec(tempCode)) !== null) {
                const name = match[1];
                const fullBlock = extractFullBlock(tempCode, match.index);
                if (fullBlock && !components.some(c => c.name === name)) {
                    components.push({ name, fullBlock });
                }
            }

            // Trier et injecter les balises
            components.sort((a, b) => tempCode.indexOf(a.fullBlock) - tempCode.indexOf(b.fullBlock));
            let finalCode = tempCode;
            const inserted = [];
            for (let i = components.length - 1; i >= 0; i--) {
                const comp = components[i];
                if (new RegExp(`\/\/\\s*==SECTION:\\s*${comp.name}==`).test(finalCode)) continue;
                const tagged = `// ==SECTION: ${comp.name}==\n${comp.fullBlock}\n// ==END==`;
                finalCode = finalCode.replace(comp.fullBlock, tagged);
                inserted.push(comp.name);
            }

            // Étape 3 : Restaurer les blocs protégés
            protectedBlocks.forEach(block => {
                finalCode = finalCode.replace(block.placeholder, block.content);
            });

            // Mettre à jour le mapping
            const newMapping = {};
            extractSections(finalCode).forEach(s => {
                newMapping[s.name] = { originalName: s.name, type: 'auto-detected', timestamp: new Date().toISOString() };
            });
            sectionMapping = newMapping;
            log(`🏷️ ${inserted.length} sections balisées (CSS/script protégés)`, 'success');
            return { code: finalCode, added: inserted };
        }

        function extractFullBlock(code, startIndex) {
            let braceIndex = code.indexOf('{', startIndex);
            if (braceIndex === -1) return null;
            let depth = 0,
                i = braceIndex;
            while (i < code.length) {
                if (code[i] === '{') depth++;
                else if (code[i] === '}') {
                    depth--;
                    if (depth === 0) {
                        let declStart = startIndex;
                        while (declStart > 0 && code[declStart - 1] !== '\n') declStart--;
                        return code.substring(declStart, i + 1);
                    }
                }
                i++;
            }
            return null;
        }

        function applyAutoTag() {
            const code = fullCodeInput.value.trim();
            if (!code) { alert('📄 Colle du code !'); return; }
            const result = autoTagCodePropre(code);
            if (result) {
                fullCode = result.code;
                fullCodeInput.value = result.code;
                updateFinalCodeDisplay();
                updateCodeStats();
                tagStatus.textContent = '✅ Balisé (CSS-safe)';
                tagStatus.className = 'text-xs text-green-400';
                log(`🏷️ ${result.added.length} sections balisées`, 'success');
                patchesContainer.innerHTML = `<div class="text-gray-500 italic">✅ Code balisé ! ${result.added.length} sections.</div>`;
                updateSandbox();
            }
        }

        // === ENVOI DE REQUÊTE ===
        async function sendRequest(instruction) {
            const apiKey = localStorage.getItem('myagent_api_key');
            if (!apiKey) { log('❌ Aucune clé API', 'error'); alert('⚠️ Sauvegarde ta clé API.'); return false; }

            let code = fullCodeInput.value.trim();
            if (!code) { log('❌ Aucun code', 'error'); alert('📄 Colle du code.'); return false; }
            if (!instruction) { log('❌ Aucune instruction', 'error'); alert('📝 Donne une instruction.'); return false; }

            if (!hasTags(code)) {
                log('⚠️ Code non balisé. Balisage CSS-safe auto...', 'warning');
                const result = autoTagCodePropre(code);
                if (result) {
                    code = result.code;
                    fullCodeInput.value = code;
                    fullCode = code;
                    updateFinalCodeDisplay();
                    updateCodeStats();
                    tagStatus.textContent = '✅ Balisé (CSS-safe)';
                    tagStatus.className = 'text-xs text-green-400';
                }
            }

            const sections = extractSections(code);
            const sectionsNames = sections.map(s => s.name).join(', ');
            log(`📤 Envoi: "${instruction.substring(0, 50)}..." (${sections.length} sections)`, 'info');

            patchesContainer.innerHTML = '<div class="text-gray-400 italic">⏳ Envoi en cours...</div>';

            try {
                const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: 'deepseek-v4-flash',
                        messages: [{
                            role: 'system',
                            content: `Tu es un expert en React/HTML. Voici le code source avec des sections balisées (// ==SECTION: nom== ... // ==END==). Sections: ${sectionsNames}.
                    ATTENTION: Ne modifie JAMAIS le contenu des balises <style>. Réponds UNIQUEMENT avec un JSON: {"patches": [{"section": "nom", "newContent": "code"}]}`
                        }, {
                            role: 'user',
                            content: `Code:\n${code}\n\nInstruction: ${instruction}`
                        }],
                        stream: false
                    })
                });

                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const data = await response.json();
                const responseText = data.choices[0].message.content;
                const jsonMatch = responseText.match(/\{[\s\S]*\}/);
                if (!jsonMatch) throw new Error('Aucun JSON trouvé');

                const patchesData = JSON.parse(jsonMatch[0]);
                const patches = patchesData.patches || [];
                if (patches.length === 0) {
                    patchesContainer.innerHTML = '<div class="text-yellow-400 text-sm">⚠️ Aucun patch généré.</div>';
                    log('Aucun patch généré', 'warning');
                    return false;
                }

                log(`📦 ${patches.length} patch(s) générés`, 'success');

                let html = `
                    <div class="bg-[#0d1117] border border-[#238636] rounded-lg p-2 space-y-1">
                        <div class="flex items-center justify-between">
                            <span class="text-sm text-green-400">✅ ${patches.length} patch(s) : ${patches.map(p => p.section).join(', ')}</span>
                            <button id="applyAllBtn" class="bg-[#238636] hover:bg-[#2ea043] text-white px-3 py-1 rounded-lg text-xs transition">Tout appliquer</button>
                        </div>
                        ${patches.map((patch, idx) => `
                            <div class="flex items-center justify-between bg-[#161b22] p-1.5 rounded-lg border border-[#30363d]">
                                <span class="text-xs font-mono text-cyan-400">📌 ${patch.section}</span>
                                <div class="flex gap-2">
                                    <button class="previewPatchBtn bg-[#1f6feb] hover:bg-[#388bfd] text-white px-2 py-1 rounded-lg text-xs transition" data-index="${idx}">👁️</button>
                                    <button class="applyPatchBtn bg-[#238636] hover:bg-[#2ea043] text-white px-2 py-1 rounded-lg text-xs transition" data-index="${idx}">🔧 Appliquer</button>
                                </div>
                            </div>
                        `).join('')}
                        ${patchesData.explanation ? `<div class="text-xs text-gray-400 border-t border-[#30363d] pt-1 mt-1">💡 ${patchesData.explanation}</div>` : ''}
                    </div>
                `;
                patchesContainer.innerHTML = html;
                patchTimestamp.textContent = new Date().toLocaleTimeString();

                document.querySelectorAll('.applyPatchBtn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const idx = parseInt(this.dataset.index);
                        const patch = patches[idx];
                        applyPatch(patch, instruction);
                        this.textContent = '✅ Appliqué';
                        this.disabled = true;
                        this.className = 'bg-green-500/20 text-green-400 px-2 py-1 rounded-lg text-xs';
                    });
                });

                document.querySelectorAll('.previewPatchBtn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const idx = parseInt(this.dataset.index);
                        const patch = patches[idx];
                        alert(`📌 Section: ${patch.section}\n\n${patch.newContent || '⚠️ Suppression'}`);
                    });
                });

                document.getElementById('applyAllBtn')?.addEventListener('click', function() {
                    let count = 0;
                    patches.forEach(p => { if (applyPatch(p, instruction)) count++; });
                    log(`✅ ${count}/${patches.length} patches appliqués`, 'success');
                    this.textContent = '✅ Appliqué';
                    this.disabled = true;
                    document.querySelectorAll('.applyPatchBtn').forEach(b => {
                        b.textContent = '✅ Appliqué';
                        b.disabled = true;
                        b.className = 'bg-green-500/20 text-green-400 px-2 py-1 rounded-lg text-xs';
                    });
                });

                return true;

            } catch (err) {
                log(`❌ Erreur : ${err.message}`, 'error');
                patchesContainer.innerHTML = `<div class="text-red-400 text-sm">❌ ${err.message}</div>`;
                return false;
            }
        }

        // === GESTION DES ENVOIS ===
        sendBtn.addEventListener('click', async () => {
            const instruction = instructionsInput.value.trim();
            if (!instruction) { alert('📝 Donne une instruction.'); return; }
            await sendRequest(instruction);
        });

        instructionsInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                const instruction = instructionsInput.value.trim();
                if (instruction) sendRequest(instruction);
            }
        });

        // === MODE BATCH ===
        toggleBatchBtn.addEventListener('click', () => {
            isBatchMode = !isBatchMode;
            batchContainer.classList.toggle('hidden');
            toggleBatchBtn.textContent = isBatchMode ? '📋 Mode batch (activé)' : '📋 Mode batch';
            toggleBatchBtn.className = `text-xs px-2 py-0.5 rounded-lg transition ${isBatchMode ? 'bg-[#f0883e] text-white' : 'bg-[#1f6feb] hover:bg-[#388bfd] text-white'}`;
        });

        batchSendBtn.addEventListener('click', async () => {
            const batchText = batchInput.value.trim();
            if (!batchText) { alert('📝 Écris des instructions.'); return; }
            const instructions = batchText.split('\n').filter(line => line.trim());
            if (instructions.length === 0) { alert('📝 Écris au moins une instruction.'); return; }

            log(`📋 Batch: ${instructions.length} instructions`, 'info');
            patchesContainer.innerHTML = `<div class="text-gray-400 italic">⏳ Exécution du batch (${instructions.length} instructions)...</div>`;

            let successCount = 0;
            for (let i = 0; i < instructions.length; i++) {
                const instr = instructions[i].trim();
                log(`📤 Batch ${i+1}/${instructions.length}: "${instr.substring(0, 40)}..."`, 'info');
                const result = await sendRequest(instr);
                if (result) successCount++;
                if (i < instructions.length - 1) await new Promise(r => setTimeout(r, 500));
            }

            log(`✅ Batch terminé : ${successCount}/${instructions.length} réussis`, 'success');
            patchesContainer.innerHTML += `<div class="text-green-400 text-sm mt-1">✅ Batch terminé : ${successCount}/${instructions.length} réussis</div>`;
        });

        // === GESTION API KEY ===
        function loadKey() {
            const saved = localStorage.getItem('myagent_api_key');
            if (saved) {
                apiKeyInput.value = saved;
                keyStatus.textContent = '✅ Clé chargée';
                keyStatus.className = 'text-xs text-green-400';
                fetchBalance(saved);
            }
        }

        function saveKey() {
            const key = apiKeyInput.value.trim();
            if (!key) { alert('❌ Colle ta clé.'); return; }
            localStorage.setItem('myagent_api_key', key);
            keyStatus.textContent = '✅ Sauvegardée';
            keyStatus.className = 'text-xs text-green-400';
            fetchBalance(key);
            log('🔑 Clé sauvegardée', 'success');
        }

        async function fetchBalance(apiKey) {
            try {
                const resp = await fetch('https://api.deepseek.com/user/balance', {
                    headers: { 'Authorization': `Bearer ${apiKey}` }
                });
                const data = await resp.json();
                if (data && data.balance_infos) {
                    const info = data.balance_infos[0];
                    balanceDisplay.textContent = `${parseFloat(info.total_balance).toFixed(2)} ${info.currency}`;
                }
            } catch (e) {
                balanceDisplay.textContent = '❌';
            }
        }

        saveKeyBtn.addEventListener('click', saveKey);
        refreshBalanceBtn.addEventListener('click', () => {
            const key = localStorage.getItem('myagent_api_key');
            if (key) fetchBalance(key);
        });

        // === ÉVÉNEMENTS DIVERS ===
        fullCodeInput.addEventListener('input', () => {
            fullCode = fullCodeInput.value;
            updateFinalCodeDisplay();
            updateCodeStats();
            if (hasTags(fullCode)) {
                tagStatus.textContent = '✅ Balisé';
                tagStatus.className = 'text-xs text-green-400';
            } else {
                tagStatus.textContent = '⚪ Non balisé';
                tagStatus.className = 'text-xs text-gray-400';
            }
        });

        autoTagBtn.addEventListener('click', applyAutoTag);
        fixCssBtn.addEventListener('click', applyFixCss);

        loadExampleBtn.addEventListener('click', () => {
            const example = `<!DOCTYPE html>
        <html>
        <head><title>Test</title>
        <style>
            body { background: #f0f0f0; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
            .container { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; }
            h1 { color: #333; }
            button { background: #007bff; color: white; border: none; padding: 10px 24px; border-radius: 8px; font-size: 16px; cursor: pointer; }
            button:hover { background: #0056b3; }
        </style>
        </head>
        <body>
            <div class="container">
                <h1>🎨 CyberNotebook</h1>
                <p>Un outil de colorimétrie</p>
                <button onclick="alert('Coucou !')">Clique-moi</button>
            </div>
        </body>
        </html>`;
            fullCodeInput.value = example;
            fullCode = example;
            updateFinalCodeDisplay();
            updateCodeStats();
            updateSandbox();
            log('📥 Exemple chargé', 'success');
            patchesContainer.innerHTML = '<div class="text-gray-500 italic">✅ Exemple chargé. Clique sur "Baliser" ou envoie une instruction.</div>';
        });

        resetCodeBtn.addEventListener('click', () => {
            if (confirm('🗑️ Réinitialiser tout ?')) {
                fullCode = '';
                fullCodeInput.value = '';
                sectionMapping = {};
                patchHistory = [];
                localStorage.removeItem('myagent_full_code');
                localStorage.removeItem('myagent_section_mapping');
                localStorage.removeItem('myagent_patch_history');
                updateFinalCodeDisplay();
                updateCodeStats();
                patchesContainer.innerHTML = '<div class="text-gray-500 italic">🧹 Tout réinitialisé</div>';
                tagStatus.textContent = '⚪ Non balisé';
                tagStatus.className = 'text-xs text-gray-400';
                log('🧹 Tout réinitialisé', 'info');
                updateSandbox();
            }
        });

        copyFinalBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(fullCode).then(() => {
                const orig = copyFinalBtn.textContent;
                copyFinalBtn.textContent = '✅';
                setTimeout(() => copyFinalBtn.textContent = orig, 1500);
                log('📋 Code copié', 'success');
            });
        });

        exportFinalBtn.addEventListener('click', () => {
            const blob = new Blob([fullCode], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'code.html';
            a.click();
            URL.revokeObjectURL(url);
            log('⬇️ Code exporté', 'success');
        });

        // === INIT ===
        loadKey();
        loadFullCode();
        updateCodeStats();
        updateSandbox();
        log('🚀 MyAgent v5.2 prêt (CSS protégé) !', 'success');
        if (fullCode) {
            patchesContainer.innerHTML = hasTags(fullCode) ?
                '<div class="text-gray-500 italic">✅ Code balisé. Envoie une instruction.</div>' :
                '<div class="text-gray-500 italic">📄 Code non balisé. Clique sur "Baliser" ou envoie une instruction.</div>';
        }
    })();
</script>

</body>
</html>

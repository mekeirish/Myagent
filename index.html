<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
    <title>🧠 Braincode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" />
    <style>
        * { font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 99px; }
        body { background: #050505; touch-action: pan-y; }
        .glass { background: rgba(18, 18, 18, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.06); }
        .card { background: #121212; border: 1px solid rgba(255,255,255,0.06); box-shadow: 0 8px 32px rgba(0,0,0,0.6); }
        .accent-blue { color: #3b82f6; }
        .accent-green { color: #10b981; }
        .btn-press:active { transform: scale(0.95); }
        .transition-app { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>

<body class="min-h-screen text-gray-200 antialiased pb-24 safe-bottom">

    <!-- ====== MAIN CONTAINER ====== -->
    <main class="max-w-lg mx-auto px-4 pt-4 pb-6 space-y-4">

        <!-- EN-TÊTE -->
        <header class="flex items-center justify-between">
            <div class="flex items-center gap-2">
                <span class="text-2xl">🧠</span>
                <h1 class="text-xl font-bold text-white tracking-tight">Braincode</h1>
                <span class="text-[10px] font-mono bg-white/10 text-white/50 px-2 py-0.5 rounded-full border border-white/5">v1.0</span>
            </div>
            <div class="flex items-center gap-2 text-xs text-white/40">
                <span id="balanceDisplay" class="font-mono">💰 ⏳</span>
                <button id="refreshBalanceBtn" class="text-white/30 hover:text-white/70 transition-app">↻</button>
            </div>
        </header>

        <!-- CARTE : Clé API -->
        <section class="card rounded-3xl p-4 space-y-2">
            <label class="text-xs font-medium text-white/40 uppercase tracking-wider">🔑 Clé API</label>
            <div class="flex gap-2">
                <input type="password" id="apiKeyInput" placeholder="sk-… colle ta clé"
                class="flex-1 bg-black/40 border border-white/10 rounded-xl px-4 py-3 text-sm text-white placeholder-white/30 focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-app" />
                <button id="saveKeyBtn" class="bg-blue-600 hover:bg-blue-500 active:scale-95 transition-app px-5 py-3 rounded-xl text-sm font-medium text-white shadow-lg shadow-blue-600/20">💾</button>
            </div>
            <div id="keyStatus" class="text-xs text-white/30">⚪ Aucune clé</div>
        </section>

        <!-- CARTE : Code Source -->
        <section class="card rounded-3xl p-4 space-y-2">
            <div class="flex items-center justify-between">
                <label class="text-xs font-medium text-white/40 uppercase tracking-wider">📄 Code Source</label>
                <div class="flex gap-2">
                    <button id="loadExampleBtn" class="text-xs bg-white/5 hover:bg-white/10 px-3 py-1.5 rounded-full text-white/50 transition-app">📥 Exemple</button>
                    <button id="resetCodeBtn" class="text-xs bg-white/5 hover:bg-red-500/20 px-3 py-1.5 rounded-full text-white/30 transition-app">🗑️</button>
                </div>
            </div>
            <textarea id="fullCodeInput" rows="5" placeholder="Colle ton code HTML ici..."
            class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3 text-sm text-gray-200 placeholder-white/20 font-mono resize-none focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-app"></textarea>
            <div class="flex justify-between text-[10px] text-white/30">
                <span id="codeStats">📊 0 sections</span>
                <span id="tagStatus">⚪ Non balisé</span>
            </div>
        </section>

        <!-- CARTE : Instructions -->
        <section class="card rounded-3xl p-4 space-y-2">
            <div class="flex items-center justify-between">
                <label class="text-xs font-medium text-white/40 uppercase tracking-wider">📝 Instructions</label>
                <button id="toggleBatchBtn" class="text-xs bg-white/5 hover:bg-white/10 px-3 py-1.5 rounded-full text-white/50 transition-app">📋 Batch</button>
            </div>
            <input type="text" id="instructionsInput" placeholder="Ex: Change la couleur du bouton en bleu"
            class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3 text-sm text-white placeholder-white/20 focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-app" />
            <div id="batchContainer" class="hidden space-y-2">
                <textarea id="batchInput" rows="3" placeholder="Une instruction par ligne..."
                class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3 text-sm text-white placeholder-white/20 font-mono resize-none focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-app"></textarea>
                <button id="batchSendBtn" class="w-full bg-blue-600/30 hover:bg-blue-600/40 active:scale-95 transition-app py-2.5 rounded-xl text-sm font-medium text-blue-300 border border-blue-500/20">🚀 Exécuter le batch</button>
            </div>
        </section>

        <!-- CARTE : Patches -->
        <section class="card rounded-3xl p-4 space-y-2">
            <div class="flex items-center justify-between">
                <span class="text-xs font-medium text-white/40 uppercase tracking-wider">🧩 Patches</span>
                <span class="text-[10px] text-white/30" id="patchTimestamp"></span>
            </div>
            <div id="patchesContainer" class="text-sm text-white/40 italic min-h-[40px]">
                En attente d'instructions...
            </div>
        </section>

        <!-- CARTE : Code Final -->
        <section class="card rounded-3xl p-4 space-y-2">
            <div class="flex items-center justify-between">
                <span class="text-xs font-medium text-white/40 uppercase tracking-wider">📦 Code Final</span>
                <div class="flex gap-2">
                    <button id="copyFinalBtn" class="text-xs bg-white/5 hover:bg-white/10 px-3 py-1.5 rounded-full text-white/50 transition-app">📋</button>
                    <button id="exportFinalBtn" class="text-xs bg-white/5 hover:bg-white/10 px-3 py-1.5 rounded-full text-white/50 transition-app">⬇️</button>
                    <button id="showHistoryBtn" class="text-xs bg-white/5 hover:bg-white/10 px-3 py-1.5 rounded-full text-white/50 transition-app">📜</button>
                </div>
            </div>
            <div id="finalCodeDisplay"
            class="bg-black/40 border border-white/10 rounded-xl p-3 min-h-[60px] max-h-48 overflow-auto text-xs font-mono text-gray-300 whitespace-pre-wrap">
            ⏳ Aucun code
        </div>
    </section>

    <!-- CARTE : Sandbox -->
    <section class="card rounded-3xl p-4 space-y-2">
        <div class="flex items-center justify-between">
            <span class="text-xs font-medium text-white/40 uppercase tracking-wider">🏖️ Aperçu en direct</span>
            <button id="refreshSandboxBtn" class="text-xs bg-white/5 hover:bg-white/10 px-3 py-1.5 rounded-full text-white/50 transition-app">↻</button>
        </div>
        <iframe id="sandboxIframe" class="w-full bg-white/5 rounded-xl border border-white/10" style="height: 200px; resize: vertical;"></iframe>
    </section>

    <!-- CARTE : Console (rétractable) -->
    <section class="card rounded-3xl p-4 space-y-2">
        <div class="flex items-center justify-between">
            <span class="text-xs font-medium text-white/40 uppercase tracking-wider">📋 Console</span>
            <div class="flex gap-2">
                <button id="clearConsoleBtn" class="text-xs bg-white/5 hover:bg-white/10 px-3 py-1.5 rounded-full text-white/30 transition-app">🗑️</button>
                <button id="copyConsoleBtn" class="text-xs bg-white/5 hover:bg-white/10 px-3 py-1.5 rounded-full text-white/50 transition-app">📋</button>
            </div>
        </div>
        <div id="consoleOutput"
        class="bg-black/40 border border-white/10 rounded-xl p-3 min-h-[60px] max-h-40 overflow-auto font-mono text-[10px] text-gray-400 whitespace-pre-wrap leading-relaxed">
        ⏳ Console prête...
    </div>
</section>

</main>

<!-- ====== BOTTOM ACTION BAR ====== -->
<nav class="fixed bottom-0 left-0 right-0 glass border-t border-white/5 px-4 py-3 safe-bottom z-50">
    <div class="max-w-lg mx-auto flex items-center gap-3">
        <button id="autoTagBtn" class="flex-1 bg-white/5 hover:bg-white/10 active:scale-95 transition-app py-3.5 rounded-2xl text-sm font-medium text-white/70 border border-white/5 flex items-center justify-center gap-2">
            🏷️ Baliser
        </button>
        <button id="sendBtn" class="flex-1 bg-blue-600 hover:bg-blue-500 active:scale-95 transition-app py-3.5 rounded-2xl text-sm font-medium text-white shadow-lg shadow-blue-600/30 flex items-center justify-center gap-2 disabled:opacity-50 disabled:pointer-events-none">
            🚀 Patcher
        </button>
    </div>
</nav>

<!-- ====== SCRIPTS ====== -->
<script>
(function() {
    'use strict';

    // ============================================
    // TOUS LES IDs SONT CONSERVÉS — LOGIQUE V6.0
    // ============================================

    // === DOM REFS ===
    const $ = id => document.getElementById(id);
    const apiKeyInput = $('apiKeyInput');
    const saveKeyBtn = $('saveKeyBtn');
    const keyStatus = $('keyStatus');
    const balanceDisplay = $('balanceDisplay');
    const refreshBalanceBtn = $('refreshBalanceBtn');
    const fullCodeInput = $('fullCodeInput');
    const instructionsInput = $('instructionsInput');
    const sendBtn = $('sendBtn');
    const batchContainer = $('batchContainer');
    const batchInput = $('batchInput');
    const batchSendBtn = $('batchSendBtn');
    const toggleBatchBtn = $('toggleBatchBtn');
    const patchesContainer = $('patchesContainer');
    const patchTimestamp = $('patchTimestamp');
    const finalCodeDisplay = $('finalCodeDisplay');
    const copyFinalBtn = $('copyFinalBtn');
    const exportFinalBtn = $('exportFinalBtn');
    const showHistoryBtn = $('showHistoryBtn');
    const codeStats = $('codeStats');
    const tagStatus = $('tagStatus');
    const loadExampleBtn = $('loadExampleBtn');
    const resetCodeBtn = $('resetCodeBtn');
    const autoTagBtn = $('autoTagBtn');
    const consoleOutput = $('consoleOutput');
    const clearConsoleBtn = $('clearConsoleBtn');
    const copyConsoleBtn = $('copyConsoleBtn');
    const sandboxIframe = $('sandboxIframe');
    const refreshSandboxBtn = $('refreshSandboxBtn');

    // === ÉTAT ===
    let fullCode = localStorage.getItem('braincode_full_code') || '';
    let sectionMapping = JSON.parse(localStorage.getItem('braincode_section_mapping') || '{}');
    let patchHistory = JSON.parse(localStorage.getItem('braincode_patch_history') || '[]');
    let isBatchMode = false;

    // === CONSOLE ===
    function log(message, type) {
        type = type || 'info';
        var prefix = { info: 'ℹ️', success: '✅', error: '❌', warning: '⚠️', debug: '🔍', tag: '🏷️' };
        var timestamp = new Date().toLocaleTimeString();
        var line = '[' + timestamp + '] ' + (prefix[type] || '•') + ' ' + message;
        consoleOutput.textContent += (consoleOutput.textContent ? '\n' : '') + line;
        consoleOutput.scrollTop = consoleOutput.scrollHeight;
        console.log('[Braincode] ' + message);
    }

    function clearConsole() { consoleOutput.textContent = '🧹 Console vidée'; }
    function copyConsole() {
        navigator.clipboard.writeText(consoleOutput.textContent).then(function() {
            var orig = copyConsoleBtn.textContent;
            copyConsoleBtn.textContent = '✅';
            setTimeout(function() { copyConsoleBtn.textContent = orig; }, 1500);
        });
    }
    clearConsoleBtn.addEventListener('click', clearConsole);
    copyConsoleBtn.addEventListener('click', copyConsole);

    // === CHARGEMENT ===
    function loadFullCode() {
        var saved = localStorage.getItem('braincode_full_code');
        if (saved) {
            fullCode = saved;
            fullCodeInput.value = saved;
            updateFinalCodeDisplay();
            updateCodeStats();
            log('Code source chargé', 'success');
            updateTagStatus();
            updateSandbox();
        }
    }

    function updateFinalCodeDisplay() {
        finalCodeDisplay.textContent = fullCode || '⏳ Aucun code source.';
        localStorage.setItem('braincode_full_code', fullCode);
        localStorage.setItem('braincode_section_mapping', JSON.stringify(sectionMapping));
        localStorage.setItem('braincode_patch_history', JSON.stringify(patchHistory));
        updateSandbox();
    }

    function updateCodeStats() {
        var sections = extractSections(fullCode);
        codeStats.textContent = '📊 ' + sections.length + ' sections';
    }

    function updateTagStatus() {
        if (hasTags(fullCode)) {
            tagStatus.textContent = '✅ Balisé';
            tagStatus.className = 'text-[10px] text-green-400';
        } else {
            tagStatus.textContent = '⚪ Non balisé';
            tagStatus.className = 'text-[10px] text-white/30';
        }
    }

    function hasTags(code) {
        return /<!--\s*SECTION:/i.test(code);
    }

    function extractSections(code) {
        var regex = /<!--\s*SECTION:\s*([^\n]+)\s*-->([\s\S]*?)<!--\s*\/SECTION:\s*\1\s*-->/gi;
        var sections = [];
        var match;
        while ((match = regex.exec(code)) !== null) {
            sections.push({
                name: match[1].trim(),
                content: match[2].trim(),
                fullMatch: match[0]
            });
        }
        return sections;
    }

    // === SANDBOX ===
    function updateSandbox() {
        try {
            var htmlContent = fullCode || '<html><body><p class="text-white/40 p-4">⏳ Aucun code</p></body></html>';
            var blob = new Blob([htmlContent], { type: 'text/html' });
            var url = URL.createObjectURL(blob);
            sandboxIframe.src = url;
            setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
        } catch (e) {
            log('❌ Erreur sandbox: ' + e.message, 'error');
        }
    }
    refreshSandboxBtn.addEventListener('click', updateSandbox);

    // === HISTORIQUE ===
    function addToHistory(patch, instruction) {
        var entry = {
            id: Date.now(),
            timestamp: new Date().toISOString(),
            section: patch.section,
            oldContent: patch.oldContent || '',
            newContent: patch.newContent,
            instruction: instruction || '',
            fullCode: fullCode
        };
        patchHistory.push(entry);
        if (patchHistory.length > 50) patchHistory.shift();
        localStorage.setItem('braincode_patch_history', JSON.stringify(patchHistory));
    }

    function showHistory() {
        if (patchHistory.length === 0) { alert('📜 Aucun historique.'); return; }
        var msg = '📜 HISTORIQUE\n' + '═'.repeat(40) + '\n';
        patchHistory.slice().reverse().forEach(function(entry, i) {
            var date = new Date(entry.timestamp).toLocaleString();
            msg += '[' + (i+1) + '] ' + date + '\n';
            msg += '📌 Section: ' + entry.section + '\n';
            msg += '📝 Instruction: ' + (entry.instruction || 'N/A') + '\n';
            msg += '─'.repeat(40) + '\n';
        });
        alert(msg);
    }
    showHistoryBtn.addEventListener('click', showHistory);

    // === APPLICATION D'UN PATCH ===
    function applyPatch(patch, instruction) {
        instruction = instruction || '';
        var section = patch.section;
        var newContent = patch.newContent;
        log('Application du patch sur "' + section + '"...', 'debug');

        var oldContent = '';
        var regex = new RegExp('<!--\\s*SECTION:\\s*' + escapeRegex(section) + '\\s*-->([\\s\\S]*?)<!--\\s*\\/SECTION:\\s*' + escapeRegex(section) + '\\s*-->', 'gi');
        var match = regex.exec(fullCode);
        if (match) oldContent = match[0];

        if (newContent === null || newContent === 'null') {
            fullCode = fullCode.replace(regex, '');
            log('Section "' + section + '" supprimée', 'success');
            fullCodeInput.value = fullCode;
            updateFinalCodeDisplay();
            updateCodeStats();
            finalCodeDisplay.textContent = fullCode;
            delete sectionMapping[section];
            localStorage.setItem('braincode_section_mapping', JSON.stringify(sectionMapping));
            addToHistory({ section: section, newContent: null, oldContent: oldContent }, instruction);
            return true;
        }

        var cleanContent = newContent;
        cleanContent = cleanContent.replace(/^```(?:jsx|javascript|html)?\s*/i, '');
        cleanContent = cleanContent.replace(/\s*```$/, '');
        cleanContent = cleanContent.trim();

        if (cleanContent === '') {
            log('⚠️ Contenu vide reçu pour "' + section + '", conservation', 'warning');
            return false;
        }

        var newSection = '<!-- SECTION: ' + section + ' -->\n' + cleanContent + '\n<!-- /SECTION: ' + section + ' -->';

        if (match) {
            fullCode = fullCode.replace(match[0], newSection);
            log('Section "' + section + '" mise à jour', 'success');
        } else {
            fullCode += '\n' + newSection;
            log('Section "' + section + '" créée', 'success');
            sectionMapping[section] = { originalName: section, type: 'patch-created', timestamp: new Date().toISOString() };
            localStorage.setItem('braincode_section_mapping', JSON.stringify(sectionMapping));
        }

        fullCodeInput.value = fullCode;
        updateFinalCodeDisplay();
        updateCodeStats();
        finalCodeDisplay.textContent = fullCode;
        addToHistory({ section: section, newContent: cleanContent, oldContent: oldContent }, instruction);
        updateSandbox();
        return true;
    }

    function escapeRegex(string) {
        return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    // === BALISAGE HTML ===
    function autoTagCode(code) {
        log('🏷️ Balisage HTML (propre)...', 'tag');

        var styleRegex = /<style[\s\S]*?<\/style>/g;
        var styleBlocks = [];
        var match;
        var tempCode = code;
        var styleIndex = 0;

        while ((match = styleRegex.exec(tempCode)) !== null) {
            var placeholder = '__STYLE_PLACEHOLDER_' + styleIndex + '__';
            styleBlocks.push({ content: match[0], placeholder: placeholder, name: 'style' + (styleIndex > 0 ? '_' + (styleIndex + 1) : '') });
            tempCode = tempCode.replace(match[0], placeholder);
            styleIndex++;
        }

        var scriptRegex = /<script(?![^>]*type="text\/babel")[\s\S]*?<\/script>/g;
        var scriptBlocks = [];
        while ((match = scriptRegex.exec(tempCode)) !== null) {
            var placeholder2 = '__SCRIPT_PLACEHOLDER_' + scriptBlocks.length + '__';
            scriptBlocks.push({ content: match[0], placeholder: placeholder2 });
            tempCode = tempCode.replace(match[0], placeholder2);
        }

        var idRegex = /<(div|section|button|canvas|input|app-container|image-wrapper|result-area)[^>]*id="([^"]+)"[^>]*>/gi;
        var idBlocks = [];
        while ((match = idRegex.exec(tempCode)) !== null) {
            var idName = match[2];
            var startIdx = match.index;
            var endIdx = tempCode.indexOf('</' + match[1] + '>', startIdx);
            if (endIdx === -1) continue;
            var fullBlock = tempCode.substring(startIdx, endIdx + ('</' + match[1] + '>').length);
            if (!idBlocks.some(function(b) { return b.name === idName; })) {
                idBlocks.push({ name: idName, content: fullBlock });
            }
        }

        var jsRegex = /(const|function)\s+([a-zA-Z_][a-zA-Z0-9_]*)\s*[=({]/g;
        var jsBlocks = [];
        while ((match = jsRegex.exec(tempCode)) !== null) {
            var name = match[2];
            var startIdx = match.index;
            var braceCount = 0;
            var i = startIdx;
            var found = false;
            while (i < tempCode.length) {
                if (tempCode[i] === '{') braceCount++;
                else if (tempCode[i] === '}') {
                    braceCount--;
                    if (braceCount === 0) {
                        var fullBlock = tempCode.substring(startIdx, i + 1);
                        if (!jsBlocks.some(function(b) { return b.name === name; })) {
                            jsBlocks.push({ name: name, content: fullBlock });
                        }
                        found = true;
                        break;
                    }
                }
                i++;
            }
        }

        var allSections = [];
        styleBlocks.forEach(function(block) {
            allSections.push({ name: block.name, content: block.content, placeholder: block.placeholder });
        });
        idBlocks.forEach(function(block) {
            allSections.push({ name: block.name, content: block.content });
        });
        jsBlocks.forEach(function(block) {
            allSections.push({ name: block.name, content: block.content });
        });

        var finalCode = tempCode;
        var added = [];

        styleBlocks.forEach(function(block) {
            var section = '<!-- SECTION: ' + block.name + ' -->\n' + block.content + '\n<!-- /SECTION: ' + block.name + ' -->';
            finalCode = finalCode.replace(block.placeholder, section);
            added.push(block.name);
        });

        var otherSections = idBlocks.concat(jsBlocks);
        otherSections.sort(function(a, b) {
            return finalCode.indexOf(a.content) - finalCode.indexOf(b.content);
        });
        for (var i = otherSections.length - 1; i >= 0; i--) {
            var block = otherSections[i];
            if (new RegExp('<!--\\s*SECTION:\\s*' + block.name + '\\s*-->', 'i').test(finalCode)) continue;
            var section = '<!-- SECTION: ' + block.name + ' -->\n' + block.content + '\n<!-- /SECTION: ' + block.name + ' -->';
            finalCode = finalCode.replace(block.content, section);
            added.push(block.name);
        }

        scriptBlocks.forEach(function(block) {
            finalCode = finalCode.replace(block.placeholder, block.content);
        });

        var newMapping = {};
        extractSections(finalCode).forEach(function(s) {
            newMapping[s.name] = { originalName: s.name, type: 'auto-detected', timestamp: new Date().toISOString() };
        });
        sectionMapping = newMapping;

        log('🏷️ ' + added.length + ' sections balisées (HTML propre)', 'success');
        return { code: finalCode, added: added };
    }

    function applyAutoTag() {
        var code = fullCodeInput.value.trim();
        if (!code) { alert('📄 Colle du code !'); return; }
        var result = autoTagCode(code);
        if (result) {
            fullCode = result.code;
            fullCodeInput.value = result.code;
            updateFinalCodeDisplay();
            updateCodeStats();
            tagStatus.textContent = '✅ Balisé';
            tagStatus.className = 'text-[10px] text-green-400';
            log('🏷️ ' + result.added.length + ' sections balisées', 'success');
            patchesContainer.innerHTML = '<div class="text-white/40 italic text-sm">✅ Code balisé ! ' + result.added.length + ' sections.</div>';
            updateSandbox();
        }
    }

    // === ENVOI DE REQUÊTE ===
    async function sendRequest(instruction) {
        var apiKey = localStorage.getItem('braincode_api_key');
        if (!apiKey) { log('❌ Aucune clé API', 'error'); alert('⚠️ Sauvegarde ta clé API.'); return false; }

        var code = fullCodeInput.value.trim();
        if (!code) { log('❌ Aucun code', 'error'); alert('📄 Colle du code.'); return false; }
        if (!instruction) { log('❌ Aucune instruction', 'error'); alert('📝 Donne une instruction.'); return false; }

        if (!hasTags(code)) {
            log('⚠️ Code non balisé. Balisage auto...', 'warning');
            var result = autoTagCode(code);
            if (result) {
                code = result.code;
                fullCodeInput.value = code;
                fullCode = code;
                updateFinalCodeDisplay();
                updateCodeStats();
                tagStatus.textContent = '✅ Balisé';
                tagStatus.className = 'text-[10px] text-green-400';
            }
        }

        var sections = extractSections(code);
        var sectionsNames = sections.map(function(s) { return s.name; }).join(', ');
        log('📤 Envoi: "' + instruction.substring(0, 50) + '..." (' + sections.length + ' sections)', 'info');

        patchesContainer.innerHTML = '<div class="text-white/40 italic text-sm animate-pulse">⏳ Envoi en cours...</div>';

        try {
            var response = await fetch('https://api.deepseek.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Authorization': 'Bearer ' + apiKey,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    model: 'deepseek-v4-flash',
                    messages: [{
                        role: 'system',
                        content: 'Tu es un expert en React/HTML. Voici le code source avec des sections balisées (<!-- SECTION: nom --> ... <!-- /SECTION: nom -->). Sections: ' + sectionsNames + '.\n\nRÈGLES IMPORTANTES :\n1. Pour modifier une section, tu DOIS renvoyer le contenu COMPLET de la section dans "newContent".\n2. Ne renvoie JAMAIS "newContent" vide.\n3. Pour une section "style", tu dois renvoyer tout le bloc <style>...</style> avec les modifications.\n4. Réponds UNIQUEMENT avec un JSON valide : {"patches": [{"section": "nom", "newContent": "contenu_complet"}]}'
                    }, {
                        role: 'user',
                        content: 'Code:\n' + code + '\n\nInstruction: ' + instruction
                    }],
                    stream: false
                })
            });

            if (!response.ok) throw new Error('HTTP ' + response.status);

            var data = await response.json();
            var responseText = data.choices[0].message.content;
            var jsonMatch = responseText.match(/\{[\s\S]*\}/);
            if (!jsonMatch) throw new Error('Aucun JSON trouvé');

            var patchesData = JSON.parse(jsonMatch[0]);
            var patches = patchesData.patches || [];
            if (patches.length === 0) {
                patchesContainer.innerHTML = '<div class="text-yellow-400/80 text-sm">⚠️ Aucun patch généré.</div>';
                log('Aucun patch généré', 'warning');
                return false;
            }

            log('📦 ' + patches.length + ' patch(s) générés', 'success');

            var html = '<div class="space-y-2">';
            html += '<div class="flex items-center justify-between">';
            html += '<span class="text-sm text-green-400">✅ ' + patches.length + ' patch(s) : ' + patches.map(function(p) { return p.section; }).join(', ') + '</span>';
            html += '<button id="applyAllBtn" class="bg-blue-600/30 hover:bg-blue-600/50 active:scale-95 transition-app px-3 py-1 rounded-xl text-xs text-blue-300 border border-blue-500/20">Tout appliquer</button>';
            html += '</div>';
            patches.forEach(function(patch, idx) {
                html += '<div class="flex items-center justify-between bg-white/5 p-2 rounded-xl border border-white/5">';
                html += '<span class="text-xs font-mono text-cyan-400">📌 ' + patch.section + '</span>';
                html += '<div class="flex gap-2">';
                html += '<button class="previewPatchBtn bg-white/5 hover:bg-white/10 active:scale-95 transition-app px-2 py-1 rounded-lg text-xs text-white/50" data-index="' + idx + '">👁️</button>';
                html += '<button class="applyPatchBtn bg-blue-600/20 hover:bg-blue-600/40 active:scale-95 transition-app px-2 py-1 rounded-lg text-xs text-blue-300" data-index="' + idx + '">🔧 Appliquer</button>';
                html += '</div></div>';
            });
            if (patchesData.explanation) {
                html += '<div class="text-[10px] text-white/30 border-t border-white/5 pt-2 mt-1">💡 ' + patchesData.explanation + '</div>';
            }
            html += '</div>';
            patchesContainer.innerHTML = html;
            patchTimestamp.textContent = new Date().toLocaleTimeString();

            document.querySelectorAll('.applyPatchBtn').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    var idx = parseInt(this.dataset.index);
                    var patch = patches[idx];
                    applyPatch(patch, instruction);
                    this.textContent = '✅ Appliqué';
                    this.disabled = true;
                    this.className = 'bg-green-500/20 text-green-400 px-2 py-1 rounded-lg text-xs';
                });
            });

            document.querySelectorAll('.previewPatchBtn').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    var idx = parseInt(this.dataset.index);
                    var patch = patches[idx];
                    alert('📌 Section: ' + patch.section + '\n\n' + (patch.newContent || '⚠️ Suppression'));
                });
            });

            document.getElementById('applyAllBtn')?.addEventListener('click', function() {
                var count = 0;
                patches.forEach(function(p) { if (applyPatch(p, instruction)) count++; });
                log('✅ ' + count + '/' + patches.length + ' patches appliqués', 'success');
                this.textContent = '✅ Appliqué';
                this.disabled = true;
                document.querySelectorAll('.applyPatchBtn').forEach(function(b) {
                    b.textContent = '✅ Appliqué';
                    b.disabled = true;
                    b.className = 'bg-green-500/20 text-green-400 px-2 py-1 rounded-lg text-xs';
                });
            });

            return true;

        } catch (err) {
            log('❌ Erreur : ' + err.message, 'error');
            patchesContainer.innerHTML = '<div class="text-red-400/80 text-sm">❌ ' + err.message + '</div>';
            return false;
        }
    }

    // === GESTION DES ENVOIS ===
    sendBtn.addEventListener('click', async function() {
        var instruction = instructionsInput.value.trim();
        if (!instruction) { alert('📝 Donne une instruction.'); return; }
        sendBtn.disabled = true;
        sendBtn.innerHTML = '⏳ Patcher...';
        await sendRequest(instruction);
        sendBtn.disabled = false;
        sendBtn.innerHTML = '🚀 Patcher';
    });

    instructionsInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            var instruction = instructionsInput.value.trim();
            if (instruction) {
                sendBtn.disabled = true;
                sendBtn.innerHTML = '⏳ Patcher...';
                sendRequest(instruction).then(function() {
                    sendBtn.disabled = false;
                    sendBtn.innerHTML = '🚀 Patcher';
                });
            }
        }
    });

    // === MODE BATCH ===
    toggleBatchBtn.addEventListener('click', function() {
        isBatchMode = !isBatchMode;
        batchContainer.classList.toggle('hidden');
        toggleBatchBtn.textContent = isBatchMode ? '📋 Batch (activé)' : '📋 Batch';
        toggleBatchBtn.className = 'text-xs px-3 py-1.5 rounded-full transition-app ' + (isBatchMode ? 'bg-blue-600/30 text-blue-300' : 'bg-white/5 hover:bg-white/10 text-white/50');
    });

    batchSendBtn.addEventListener('click', async function() {
        var batchText = batchInput.value.trim();
        if (!batchText) { alert('📝 Écris des instructions.'); return; }
        var instructions = batchText.split('\n').filter(function(line) { return line.trim(); });
        if (instructions.length === 0) { alert('📝 Écris au moins une instruction.'); return; }

        log('📋 Batch: ' + instructions.length + ' instructions', 'info');
        patchesContainer.innerHTML = '<div class="text-white/40 italic text-sm animate-pulse">⏳ Exécution du batch...</div>';

        var successCount = 0;
        for (var i = 0; i < instructions.length; i++) {
            var instr = instructions[i].trim();
            var result = await sendRequest(instr);
            if (result) successCount++;
            if (i < instructions.length - 1) await new Promise(function(r) { setTimeout(r, 500); });
        }

        log('✅ Batch terminé : ' + successCount + '/' + instructions.length + ' réussis', 'success');
        patchesContainer.innerHTML += '<div class="text-green-400/80 text-sm mt-1">✅ Batch : ' + successCount + '/' + instructions.length + ' réussis</div>';
    });

    // === GESTION API KEY ===
    function loadKey() {
        var saved = localStorage.getItem('braincode_api_key');
        if (saved) {
            apiKeyInput.value = saved;
            keyStatus.textContent = '✅ Clé chargée';
            keyStatus.className = 'text-xs text-green-400';
            fetchBalance(saved);
        }
    }

    function saveKey() {
        var key = apiKeyInput.value.trim();
        if (!key) { alert('❌ Colle ta clé.'); return; }
        localStorage.setItem('braincode_api_key', key);
        keyStatus.textContent = '✅ Sauvegardée';
        keyStatus.className = 'text-xs text-green-400';
        fetchBalance(key);
        log('🔑 Clé sauvegardée', 'success');
    }

    async function fetchBalance(apiKey) {
        try {
            var resp = await fetch('https://api.deepseek.com/user/balance', {
                headers: { 'Authorization': 'Bearer ' + apiKey }
            });
            var data = await resp.json();
            if (data && data.balance_infos) {
                var info = data.balance_infos[0];
                balanceDisplay.textContent = '💰 ' + parseFloat(info.total_balance).toFixed(2) + ' ' + info.currency;
            }
        } catch (e) {
            balanceDisplay.textContent = '💰 ❌';
        }
    }

    saveKeyBtn.addEventListener('click', saveKey);
    refreshBalanceBtn.addEventListener('click', function() {
        var key = localStorage.getItem('braincode_api_key');
        if (key) fetchBalance(key);
    });

    // === ÉVÉNEMENTS DIVERS ===
    fullCodeInput.addEventListener('input', function() {
        fullCode = fullCodeInput.value;
        updateFinalCodeDisplay();
        updateCodeStats();
        updateTagStatus();
    });

    autoTagBtn.addEventListener('click', function() {
        applyAutoTag();
    });

    loadExampleBtn.addEventListener('click', function() {
        var example = '<!DOCTYPE html>\n<html>\n<head>\n<title>Pipette</title>\n<style>\nbody { background: #0f0f12; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }\n.app { background: #1a1a24; padding: 30px; border-radius: 16px; text-align: center; }\nbutton { background: #3b82f6; color: white; border: none; padding: 10px 24px; border-radius: 8px; font-size: 16px; cursor: pointer; }\n<\/style>\n<\/head>\n<body>\n<div class="app">\n<h1 class="text-white">🎨 Braincode</h1>\n<p class="text-white/50">Charge une image et sélectionne des couleurs</p>\n<button onclick="alert(\'Coucou !\')">Clique-moi</button>\n</div>\n</body>\n</html>';
        fullCodeInput.value = example;
        fullCode = example;
        updateFinalCodeDisplay();
        updateCodeStats();
        updateTagStatus();
        updateSandbox();
        log('📥 Exemple chargé', 'success');
        patchesContainer.innerHTML = '<div class="text-white/40 italic text-sm">✅ Exemple chargé.</div>';
    });

    resetCodeBtn.addEventListener('click', function() {
        if (confirm('🗑️ Réinitialiser tout ?')) {
            fullCode = '';
            fullCodeInput.value = '';
            sectionMapping = {};
            patchHistory = [];
            localStorage.removeItem('braincode_full_code');
            localStorage.removeItem('braincode_section_mapping');
            localStorage.removeItem('braincode_patch_history');
            updateFinalCodeDisplay();
            updateCodeStats();
            patchesContainer.innerHTML = '<div class="text-white/40 italic text-sm">🧹 Tout réinitialisé</div>';
            tagStatus.textContent = '⚪ Non balisé';
            tagStatus.className = 'text-[10px] text-white/30';
            log('🧹 Tout réinitialisé', 'info');
            updateSandbox();
        }
    });

    copyFinalBtn.addEventListener('click', function() {
        navigator.clipboard.writeText(fullCode).then(function() {
            var orig = copyFinalBtn.textContent;
            copyFinalBtn.textContent = '✅';
            setTimeout(function() { copyFinalBtn.textContent = orig; }, 1500);
            log('📋 Code copié', 'success');
        });
    });

    exportFinalBtn.addEventListener('click', function() {
        var blob = new Blob([fullCode], { type: 'text/html' });
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = 'code.html';
        a.click();
        URL.revokeObjectURL(url);
        log('⬇️ Code exporté', 'success');
    });

    // === INIT ===
    loadKey();
    loadFullCode();
    updateCodeStats();
    updateTagStatus();
    updateSandbox();
    log('🧠 Braincode v1.0 prêt !', 'success');
    if (fullCode) {
        patchesContainer.innerHTML = hasTags(fullCode) ?
            '<div class="text-white/40 italic text-sm">✅ Code balisé. Envoie une instruction.</div>' :
            '<div class="text-white/40 italic text-sm">📄 Code non balisé. Clique sur "Baliser" ou envoie une instruction.</div>';
    }
})();
</script>

</body>
</html>

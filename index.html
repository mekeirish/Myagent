<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🧠 MyAgent v3.1 — Patcher avec Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#0d1117] text-gray-200 font-sans antialiased min-h-screen flex items-center justify-center p-4">

    <main class="w-full max-w-4xl bg-[#161b22] border border-[#30363d] rounded-2xl shadow-2xl p-4 md:p-6 space-y-4">

        <!-- En-tête -->
        <header class="flex items-center justify-between border-b border-[#30363d] pb-3">
            <div class="flex items-center gap-2">
                <span class="text-2xl">🧠</span>
                <h1 class="text-xl font-bold text-[#58a6ff]">MyAgent v3.1</h1>
                <span class="text-xs bg-[#238636] text-white px-2 py-0.5 rounded-full">⚡ Console</span>
            </div>
            <div class="text-xs text-gray-500">🔒 localStorage</div>
        </header>

        <!-- Clé API + Solde (compact) -->
        <section class="bg-[#0d1117] border border-[#30363d] rounded-xl p-3 space-y-2">
            <div class="flex flex-col sm:flex-row gap-2">
                <div class="flex-1 flex flex-col sm:flex-row gap-2">
                    <input type="password" id="apiKeyInput" placeholder="sk-…" class="flex-1 bg-[#0d1117] border border-[#30363d] rounded-lg px-3 py-2 text-sm" />
                    <button id="saveKeyBtn" class="bg-[#1f6feb] hover:bg-[#388bfd] text-white px-4 py-2 rounded-lg text-sm transition">💾 Sauvegarder</button>
                </div>
                <div class="flex items-center gap-3 text-sm">
                    <span class="text-gray-400">💰</span>
                    <span id="balanceDisplay" class="font-mono text-green-400">⏳</span>
                    <button id="refreshBalanceBtn" class="text-xs text-[#58a6ff]">↻</button>
                </div>
            </div>
            <div id="keyStatus" class="text-xs text-gray-400">⚪ Aucune clé</div>
        </section>

        <!-- Code Source -->
        <section class="space-y-1">
            <div class="flex items-center justify-between">
                <label class="text-sm font-medium text-gray-300">📄 Code Source (sections balisées)</label>
                <div class="flex gap-2">
                    <button id="loadExampleBtn" class="text-xs bg-[#1f6feb] hover:bg-[#388bfd] px-2 py-1 rounded-lg">📥 Exemple</button>
                    <button id="resetCodeBtn" class="text-xs bg-red-500/20 hover:bg-red-500/30 text-red-400 px-2 py-1 rounded-lg">🗑️</button>
                </div>
            </div>
            <textarea id="fullCodeInput" rows="6" placeholder="// ==SECTION: nom== ... // ==END=="
            class="w-full bg-[#0d1117] border border-[#30363d] rounded-lg px-3 py-2 text-sm text-gray-200 placeholder-gray-500 font-mono resize-y"></textarea>
            <div class="text-xs text-gray-500" id="codeStats">📊 0 sections</div>
        </section>

        <!-- Instructions + Envoi -->
        <section class="flex gap-2">
            <input type="text" id="instructionsInput" placeholder="📝 Instructions..."
            class="flex-1 bg-[#0d1117] border border-[#30363d] rounded-lg px-3 py-2 text-sm" />
            <button id="sendBtn" class="bg-[#238636] hover:bg-[#2ea043] text-white px-4 py-2 rounded-lg text-sm transition disabled:opacity-50">🚀</button>
        </section>

        <!-- Patches détectés -->
        <section class="border-t border-[#30363d] pt-3">
            <div class="flex items-center justify-between mb-1">
                <span class="text-sm font-medium text-gray-300">🧩 Patches</span>
                <span class="text-xs text-gray-500" id="patchTimestamp"></span>
            </div>
            <div id="patchesContainer" class="space-y-1 text-sm">
                <div class="text-gray-500 italic">En attente d'instructions...</div>
            </div>
        </section>

        <!-- Code final -->
        <section class="border-t border-[#30363d] pt-3">
            <div class="flex items-center justify-between mb-1">
                <span class="text-sm font-medium text-gray-300">📦 Code Final</span>
                <div class="flex gap-2">
                    <button id="copyFinalBtn" class="text-xs bg-[#1f6feb] hover:bg-[#388bfd] text-white px-2 py-1 rounded-lg">📋</button>
                    <button id="exportFinalBtn" class="text-xs bg-[#238636] hover:bg-[#2ea043] text-white px-2 py-1 rounded-lg">⬇️</button>
                </div>
            </div>
            <div id="finalCodeDisplay"
            class="bg-[#0d1117] border border-[#30363d] rounded-lg p-3 min-h-[80px] text-sm text-gray-300 whitespace-pre-wrap font-mono overflow-auto max-h-48">
            ⏳ Aucun code
        </div>
    </section>

    <!-- 📋 CONSOLE DE LOGS (AJOUTÉE) -->
    <section class="border-t border-[#30363d] pt-3">
        <div class="flex items-center justify-between mb-1">
            <span class="text-sm font-medium text-gray-300">📋 Console</span>
            <div class="flex gap-2">
                <button id="clearConsoleBtn" class="text-xs bg-red-500/20 hover:bg-red-500/30 text-red-400 px-2 py-1 rounded-lg">🗑️ Effacer</button>
                <button id="copyConsoleBtn" class="text-xs bg-[#1f6feb] hover:bg-[#388bfd] text-white px-2 py-1 rounded-lg">📋 Copier</button>
            </div>
        </div>
        <div id="consoleOutput"
        class="bg-[#0a0a0c] border border-[#30363d] rounded-lg p-2 min-h-[100px] max-h-[200px] overflow-auto font-mono text-xs text-gray-400 whitespace-pre-wrap">
        ⏳ Console prête...
    </div>
</section>

<!-- Footer -->
<footer class="text-xs text-gray-600 border-t border-[#30363d] pt-2 flex justify-between">
    <span>🧠 MyAgent v3.1 · Patcher</span>
    <span>⚡ cache automatique</span>
</footer>
</main>

<!-- ======================== JAVASCRIPT ======================== -->
<script>
    (function() {
        // === RÉFÉRENCES DOM ===
        const $ = id => document.getElementById(id);
        const apiKeyInput = $('apiKeyInput');
        const saveKeyBtn = $('saveKeyBtn');
        const keyStatus = $('keyStatus');
        const balanceDisplay = $('balanceDisplay');
        const refreshBalanceBtn = $('refreshBalanceBtn');
        const fullCodeInput = $('fullCodeInput');
        const instructionsInput = $('instructionsInput');
        const sendBtn = $('sendBtn');
        const patchesContainer = $('patchesContainer');
        const patchTimestamp = $('patchTimestamp');
        const finalCodeDisplay = $('finalCodeDisplay');
        const copyFinalBtn = $('copyFinalBtn');
        const exportFinalBtn = $('exportFinalBtn');
        const codeStats = $('codeStats');
        const loadExampleBtn = $('loadExampleBtn');
        const resetCodeBtn = $('resetCodeBtn');
        const consoleOutput = $('consoleOutput');
        const clearConsoleBtn = $('clearConsoleBtn');
        const copyConsoleBtn = $('copyConsoleBtn');

        // === CONSOLE ===
        function log(message, type = 'info') {
            const colors = {
                info: 'text-gray-400',
                success: 'text-green-400',
                error: 'text-red-400',
                warning: 'text-yellow-400',
                debug: 'text-cyan-400'
            };
            const prefix = {
                info: 'ℹ️',
                success: '✅',
                error: '❌',
                warning: '⚠️',
                debug: '🔍'
            };
            const timestamp = new Date().toLocaleTimeString();
            const line = `[${timestamp}] ${prefix[type] || '•'} ${message}`;
            consoleOutput.textContent += (consoleOutput.textContent ? '\n' : '') + line;
            consoleOutput.scrollTop = consoleOutput.scrollHeight;
            // Affiche aussi dans la console JS pour debug
            console.log(`[MyAgent] ${message}`);
        }

        function clearConsole() {
            consoleOutput.textContent = '🧹 Console vidée';
        }

        function copyConsole() {
            navigator.clipboard.writeText(consoleOutput.textContent).then(() => {
                const orig = copyConsoleBtn.textContent;
                copyConsoleBtn.textContent = '✅';
                setTimeout(() => copyConsoleBtn.textContent = orig, 1500);
            });
        }

        clearConsoleBtn.addEventListener('click', clearConsole);
        copyConsoleBtn.addEventListener('click', copyConsole);

        // === ÉTAT ===
        let fullCode = localStorage.getItem('myagent_full_code') || '';
        let patchesHistory = [];
        let currentPatchesData = null;

        // === CHARGEMENT ===
        function loadFullCode() {
            const saved = localStorage.getItem('myagent_full_code');
            if (saved) {
                fullCode = saved;
                fullCodeInput.value = saved;
                updateFinalCodeDisplay();
                updateCodeStats();
                log('Code source chargé depuis localStorage', 'success');
            } else {
                log('Aucun code source sauvegardé', 'info');
            }
        }

        function updateFinalCodeDisplay() {
            finalCodeDisplay.textContent = fullCode || '⏳ Aucun code source.';
            localStorage.setItem('myagent_full_code', fullCode);
        }

        function updateCodeStats() {
            const sections = extractSections(fullCode);
            codeStats.textContent = `📊 ${sections.length} sections`;
        }

        // === EXTRACTION DES SECTIONS ===
        function extractSections(code) {
            const regex = /\/\/\s*==SECTION:\s*([^\n]+)==\s*([\s\S]*?)\s*\/\/\s*==END==/g;
            const sections = [];
            let match;
            while ((match = regex.exec(code)) !== null) {
                sections.push({
                    name: match[1].trim(),
                    content: match[2].trim(),
                    fullMatch: match[0]
                });
            }
            return sections;
        }

        // === ÉCHAPPEMENT REGEX ===
        function escapeRegex(string) {
            return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        // === APPLIQUER UN PATCH ===
        function applyPatch(patch) {
            const { section, newContent } = patch;
            log(`Application du patch sur la section "${section}"...`, 'debug');

            if (newContent === null || newContent === 'null') {
                const regex = new RegExp(`\/\/\\s*==SECTION:\\s*${escapeRegex(section)}==[\\s\\S]*?\\/\\/\\s*==END==`, 'g');
                fullCode = fullCode.replace(regex, '');
                log(`Section "${section}" supprimée`, 'success');
                fullCodeInput.value = fullCode;
                updateFinalCodeDisplay();
                updateCodeStats();
                return true;
            }

            // Nettoyer le contenu (enlever les backticks si présents)
            let cleanContent = newContent;
            cleanContent = cleanContent.replace(/^```(?:jsx|javascript|html)?\s*/i, '');
            cleanContent = cleanContent.replace(/\s*```$/, '');
            cleanContent = cleanContent.trim();

            // Rechercher la section existante
            const regex = new RegExp(`(\/\/\\s*==SECTION:\\s*${escapeRegex(section)}==)[\\s\\S]*?(\/\/\\s*==END==)`, 'g');
            const match = regex.exec(fullCode);

            if (match) {
                const newSection = `// ==SECTION: ${section}==\n${cleanContent}\n// ==END==`;
                fullCode = fullCode.replace(match[0], newSection);
                log(`Section "${section}" mise à jour (remplacement)`, 'success');
            } else {
                const newSection = `\n// ==SECTION: ${section}==\n${cleanContent}\n// ==END==`;
                fullCode += newSection;
                log(`Section "${section}" créée (nouvelle)`, 'success');
            }

            fullCodeInput.value = fullCode;
            updateFinalCodeDisplay();
            updateCodeStats();
            return true;
        }

        // === ENVOI DE LA REQUÊTE ===
        async function sendRequest() {
            const apiKey = localStorage.getItem('myagent_api_key');
            if (!apiKey) {
                log('❌ Aucune clé API sauvegardée', 'error');
                alert('⚠️ Sauvegarde d\'abord ta clé API.');
                return;
            }

            const code = fullCodeInput.value.trim();
            const instructions = instructionsInput.value.trim();

            if (!code) {
                log('❌ Aucun code source', 'error');
                alert('📄 Colle le code source.');
                return;
            }
            if (!instructions) {
                log('❌ Aucune instruction', 'error');
                alert('📝 Donne des instructions.');
                return;
            }

            const sections = extractSections(code);
            const sectionsNames = sections.map(s => s.name).join(', ');
            log(`📤 Envoi de la requête avec ${sections.length} sections : ${sectionsNames}`, 'info');

            sendBtn.disabled = true;
            sendBtn.textContent = '⏳';
            patchesContainer.innerHTML = '<div class="text-gray-400 italic">⏳ Envoi en cours...</div>';

            try {
                const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: 'deepseek-v4-flash',
                        messages: [{
                            role: 'system',
                            content: `Tu es un expert en React/HTML. Voici le code source avec des sections balisées (// ==SECTION: nom== ... // ==END==). Sections existantes : ${sectionsNames}.

                    RÉPONDS UNIQUEMENT AVEC UN JSON STRUCTURÉ :
                    {
                        "patches": [
                            {
                                "section": "nom_de_la_section",
                                "newContent": "le nouveau code de la section (sans les balises SECTION/END)"
                            }
                        ],
                        "explanation": "brève explication des changements"
                    }

                    Si tu dois créer une nouvelle section, utilise un nom unique.
                    Si tu dois supprimer une section, mets "newContent": null.
                    Le JSON doit être valide et ne contenir aucun autre texte.`
                        }, {
                            role: 'user',
                            content: `Code source actuel :\n${code}\n\nInstructions : ${instructions}`
                        }],
                        stream: false
                    })
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`HTTP ${response.status}: ${errorText}`);
                }

                const data = await response.json();
                const responseText = data.choices[0].message.content;

                log(`📥 Réponse reçue (${responseText.length} caractères)`, 'info');

                // === PARSER LE JSON ===
                let patchesData;
                try {
                    const jsonMatch = responseText.match(/\{[\s\S]*\}/);
                    if (jsonMatch) {
                        patchesData = JSON.parse(jsonMatch[0]);
                        log(`✅ JSON parsé avec succès`, 'success');
                    } else {
                        throw new Error('Aucun JSON trouvé');
                    }
                } catch (err) {
                    log(`❌ Erreur de parsing JSON : ${err.message}`, 'error');
                    log(`📄 Réponse brute : ${responseText.substring(0, 300)}...`, 'debug');
                    patchesContainer.innerHTML = `<div class="text-red-400 text-sm">❌ Erreur : ${err.message}</div>`;
                    return;
                }

                // === AFFICHER LES PATCHES ===
                currentPatchesData = patchesData;
                const patches = patchesData.patches || [];

                if (patches.length === 0) {
                    patchesContainer.innerHTML = '<div class="text-yellow-400 text-sm">⚠️ Aucun patch généré.</div>';
                    log('Aucun patch généré', 'warning');
                    return;
                }

                log(`📦 ${patches.length} patch(s) généré(s) : ${patches.map(p => p.section).join(', ')}`, 'success');

                let html = `
                    <div class="bg-[#0d1117] border border-[#238636] rounded-lg p-2 space-y-1">
                        <div class="flex items-center justify-between">
                            <span class="text-sm text-green-400">✅ ${patches.length} patch(s) : ${patches.map(p => p.section).join(', ')}</span>
                            <button id="applyAllBtn" class="bg-[#238636] hover:bg-[#2ea043] text-white px-3 py-1 rounded-lg text-xs transition">Tout appliquer</button>
                        </div>
                        ${patches.map((patch, idx) => `
                            <div class="flex items-center justify-between bg-[#161b22] p-1.5 rounded-lg border border-[#30363d]">
                                <span class="text-xs font-mono text-cyan-400">📌 ${patch.section}</span>
                                <div class="flex gap-2">
                                    <button class="previewPatchBtn bg-[#1f6feb] hover:bg-[#388bfd] text-white px-2 py-1 rounded-lg text-xs transition" data-index="${idx}">👁️</button>
                                    <button class="applyPatchBtn bg-[#238636] hover:bg-[#2ea043] text-white px-2 py-1 rounded-lg text-xs transition" data-index="${idx}">🔧 Appliquer</button>
                                </div>
                            </div>
                        `).join('')}
                        ${patchesData.explanation ? `<div class="text-xs text-gray-400 border-t border-[#30363d] pt-1 mt-1">💡 ${patchesData.explanation}</div>` : ''}
                    </div>
                `;
                patchesContainer.innerHTML = html;
                patchTimestamp.textContent = new Date().toLocaleTimeString();

                // === ÉVÉNEMENTS DES BOUTONS ===
                document.querySelectorAll('.applyPatchBtn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const index = parseInt(this.dataset.index);
                        const patch = currentPatchesData.patches[index];
                        const success = applyPatch(patch);
                        if (success) {
                            log(`✅ Patch "${patch.section}" appliqué avec succès`, 'success');
                            this.textContent = '✅ Appliqué';
                            this.disabled = true;
                            this.className = 'bg-green-500/20 text-green-400 px-2 py-1 rounded-lg text-xs';
                        } else {
                            log(`❌ Échec du patch "${patch.section}"`, 'error');
                        }
                    });
                });

                document.querySelectorAll('.previewPatchBtn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const index = parseInt(this.dataset.index);
                        const patch = currentPatchesData.patches[index];
                        log(`🔍 Aperçu de "${patch.section}" :\n${patch.newContent || 'null (suppression)'}`, 'debug');
                        alert(`📌 Section: ${patch.section}\n\n${patch.newContent || '⚠️ Suppression'}`);
                    });
                });

                document.getElementById('applyAllBtn')?.addEventListener('click', function() {
                    let successCount = 0;
                    currentPatchesData.patches.forEach(p => {
                        if (applyPatch(p)) successCount++;
                    });
                    log(`✅ ${successCount}/${currentPatchesData.patches.length} patches appliqués`, 'success');
                    this.textContent = '✅ Appliqué';
                    this.disabled = true;
                    // Désactiver tous les boutons "Appliquer"
                    document.querySelectorAll('.applyPatchBtn').forEach(b => {
                        b.textContent = '✅ Appliqué';
                        b.disabled = true;
                        b.className = 'bg-green-500/20 text-green-400 px-2 py-1 rounded-lg text-xs';
                    });
                });

            } catch (err) {
                log(`❌ Erreur : ${err.message}`, 'error');
                patchesContainer.innerHTML = `<div class="text-red-400 text-sm">❌ ${err.message}</div>`;
                console.error(err);
            } finally {
                sendBtn.disabled = false;
                sendBtn.textContent = '🚀';
            }
        }

        // === GESTION API KEY ET SOLDE ===
        function loadKey() {
            const saved = localStorage.getItem('myagent_api_key');
            if (saved) {
                apiKeyInput.value = saved;
                keyStatus.textContent = '✅ Clé chargée';
                keyStatus.className = 'text-xs text-green-400';
                fetchBalance(saved);
                log('🔑 Clé chargée depuis localStorage', 'success');
            } else {
                log('🔑 Aucune clé sauvegardée', 'info');
            }
        }

        function saveKey() {
            const key = apiKeyInput.value.trim();
            if (!key) {
                log('❌ Clé vide', 'error');
                alert('❌ Colle ta clé.');
                return;
            }
            localStorage.setItem('myagent_api_key', key);
            keyStatus.textContent = '✅ Sauvegardée';
            keyStatus.className = 'text-xs text-green-400';
            fetchBalance(key);
            log('🔑 Clé sauvegardée', 'success');
        }

        async function fetchBalance(apiKey) {
            try {
                const resp = await fetch('https://api.deepseek.com/user/balance', {
                    headers: { 'Authorization': `Bearer ${apiKey}` }
                });
                const data = await resp.json();
                if (data && data.balance_infos) {
                    const info = data.balance_infos[0];
                    balanceDisplay.textContent = `${parseFloat(info.total_balance).toFixed(2)} ${info.currency}`;
                    log(`💰 Solde : ${info.total_balance} ${info.currency}`, 'success');
                } else {
                    balanceDisplay.textContent = '❌';
                    log('⚠️ Solde non disponible', 'warning');
                }
            } catch (e) {
                balanceDisplay.textContent = '❌';
                log('❌ Erreur solde', 'error');
            }
        }

        // === ÉVÉNEMENTS ===
        saveKeyBtn.addEventListener('click', saveKey);
        refreshBalanceBtn.addEventListener('click', () => {
            const key = localStorage.getItem('myagent_api_key');
            if (key) fetchBalance(key);
        });

        fullCodeInput.addEventListener('input', () => {
            fullCode = fullCodeInput.value;
            updateFinalCodeDisplay();
            updateCodeStats();
        });

        sendBtn.addEventListener('click', sendRequest);
        instructionsInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') sendRequest();
        });

        // === EXEMPLE ===
        loadExampleBtn.addEventListener('click', () => {
            const example = `// ==SECTION: header==
        <header className="bg-black p-4">
            <h1>Mon App</h1>
        </header>
        // ==END==

        // ==SECTION: handleSubmit==
        const handleSubmit = (e) => {
            e.preventDefault();
            console.log('Submit !');
        };
        // ==END==

        // ==SECTION: render==
        return (
            <div>
                <form onSubmit={handleSubmit}>
                    <input type="text" />
                    <button>Envoyer</button>
                </form>
            </div>
        );
        // ==END==`;
            fullCodeInput.value = example;
            fullCode = example;
            updateFinalCodeDisplay();
            updateCodeStats();
            log('📥 Exemple de code chargé', 'success');
            patchesContainer.innerHTML = '<div class="text-gray-500 italic">✅ Code exemple chargé. Envoie une instruction.</div>';
        });

        resetCodeBtn.addEventListener('click', () => {
            if (confirm('🗑️ Réinitialiser le code ?')) {
                fullCode = '';
                fullCodeInput.value = '';
                updateFinalCodeDisplay();
                updateCodeStats();
                patchesContainer.innerHTML = '<div class="text-gray-500 italic">🧹 Code vidé</div>';
                log('🧹 Code réinitialisé', 'info');
            }
        });

        // === BOUTONS COPIER / EXPORTER ===
        copyFinalBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(fullCode).then(() => {
                log('📋 Code final copié', 'success');
                const orig = copyFinalBtn.textContent;
                copyFinalBtn.textContent = '✅';
                setTimeout(() => copyFinalBtn.textContent = orig, 1500);
            });
        });

        exportFinalBtn.addEventListener('click', () => {
            const blob = new Blob([fullCode], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'code_patche.html';
            a.click();
            URL.revokeObjectURL(url);
            log('⬇️ Code exporté', 'success');
        });

        // === INIT ===
        loadKey();
        loadFullCode();
        updateCodeStats();
        log('🚀 MyAgent v3.1 prêt', 'success');
        if (fullCode) {
            patchesContainer.innerHTML = '<div class="text-gray-500 italic">✅ Code source chargé. Envoie une instruction.</div>';
        }
    })();
</script>

</body>
</html>
